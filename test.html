<!DOCTYPE html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

{block:Description}
<meta name="description" content="{MetaDescription}" />
{/block:Description}

<title>{Title}</title>

<meta name="color:Background" content="#ffffee">
<meta name="color:Gradient Top" content="#fed6ae">
<meta name="color:Gradient Bottom" content="#ffffee">
<meta name="color:Title" content="#800000">
<meta name="color:Text" content="#800000">
<meta name="color:Link" content="#0000ee">
<meta name="color:Link Hover" content="#dd0000">
<meta name="color:Reply" content="#f0e0d6">
<meta name="color:Lines" content="#d9bfb7">
<meta name="color:Post Title" content="#cc1105">
<meta name="color:Names" content="#117743">
<meta name="color:Button Background" content="#9f403b">
<meta name="color:Button Border" content="#800201">
<meta name="color:Meme Arrows" content="#789922">

<meta name="image:Banner" content="https://secure.static.tumblr.com/65fb06ec471cd77cf293ddb9589269df/cqfswrg/auzon6t6z/tumblr_static_4d3yti1o1fcw00g08k0kks8o0.gif">

<meta name="if:Gradient Background" content="1">
<meta name="if:Anonymous" content="1">
<meta name="if:Spoiler Text" content="1">
<meta name="if:Borders" content="1">
<meta name="if:Infinite Scroll" content="1">
<meta name="if:Yotsuba Favicon" content="1">

<meta name="font:Font" content="helvetica, sans-serif">

<meta name="text:Font Size" content="13">

<style>

#submit_form,
#ask_form {
    max-width:750px;
}

html {
    min-height:100%;
}

body {
    margin:0;
    padding:0;
    min-height:100%;
    background:{color:Background};
    
    {block:IfGradientBackground}
    background:{color:Gradient Bottom};
    background:-webkit-linear-gradient({color:Gradient Top}, {color:Gradient Bottom} 200px);
    background:-o-linear-gradient({color:Gradient Top}, {color:Gradient Bottom} 200px);
    background:-moz-linear-gradient({color:Gradient Top}, {color:Gradient Bottom} 200px);
    background:linear-gradient({color:Gradient Top}, {color:Gradient Bottom} 200px);
    {/block:IfGradientBackground}
    
    color:{color:Text};
    font-size:{text:Font Size}px;
    font-family:{font:Font};
    word-wrap:break-word;
}

a {
    color:{color:Link};
}

a:hover {
    color:{color:Link Hover};
}

pre {
    white-space:pre-wrap;
}

img {
    max-width:100%;
    height:auto;
}

.lightbox-image {
    max-width:none;
}

figure {
    margin-right:0;
    margin-left:0;
}

blockquote,
blockquote a,
q {
    margin-left:0;
    margin-right:0;
    padding:0;
    color:{color:Meme Arrows};
}

blockquote > *:before,
q:before {
    content:'>';
    display:inline;
}

*:first-child {
    margin-top:0;
}

*:last-child {
    margin-bottom:0;
}

.reply ul,
.reply ol {
    display:table;
    padding-left:2em;
}



button {
    background:none;
    border:none;
    padding:0;
}

button::-moz-focus-inner {
    border:0;
    padding:0;
}

.wrapper {
    padding:10px;
    min-height:100%;
}

.clearfix {
    overflow:auto;
    zoom:1;
}

/* essential tumblr styling */


/* header */

.page--links {
    text-transform:lowercase;
}

.page--header {
    text-align:center;
    width:84vw;
    margin:10px auto;
}

.page--title {
    margin:10px 0;
    color:{color:Title};
}

.header--banner {
    border:1px solid black;
}

.page--description {
    text-align:left;
    max-width:400px;
    margin:0 auto;
}

.posts {
    border-bottom:1px solid {color:Lines};
    margin:10px 0;
}

/* posts */

.post {
    border-top:1px solid {color:Lines};
}

.post-closed .post--content {
    display:none;
}

.post--header {
    margin:10px 0;
}

.post-closed .post--header {
    opacity:0.5;
}

.post--button--container {
    display:inline-block;
    position:relative;
    height:1em;
    width:1em;
    margin-right:0.2em;
    margin-bottom:-0.2em;
    border-radius:3px;
    border:1px solid {color:Button Border};
    background:{color:Button Background};
    background-repeat:no-repeat;

    -webkit-background-size:cover;
    -moz-background-size:cover;
    -o-background-size:cover;
    background-size:cover;
}

.post--button {
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    cursor:pointer;
}

.post--title {
    font-weight:bold;
    color:{color:Post Title};
}

.post--name {
    font-weight:bold;
    color:{color:Names};
}

.post--id {
    text-decoration:none;
    color:{color:Text};
}

.reply img {
    width:320px;
}

article:nth-of-type(5n) .media {
    width:320px;
}

article:nth-of-type(5n + 1) .media {
    width:370px;
}

article:nth-of-type(5n + 2) .media {
    width:420px;
}

article:nth-of-type(5n + 4) .media {
    width:500px;
}

.media {
    float:left;
    margin:0 10px 10px 0;
    max-width:100%;
    width:470px;
}

.media iframe {
    max-width:100%;
}

.answer--question {
    font-weight:bold;
}

.quote--quote {
    font-style:italic;
}

.post-quote .caption:nth-of-type(n + 2) {
    display:none;
}

.reply--name {
    font-weight:bold;
    text-decoration:none;
    display:inline;
}

.reply--name-inactive {
    text-decoration:line-through;
}

.reply:first-of-type {
    max-width:750px;
}

.post-photo .reply:first-of-type,
.post-video .reply:first-of-type,
.post-audio .reply:first-of-type,
.post-photoset .reply:first-of-type {
    max-width:900px;
}

.reply {
    margin:0 0 10px 0;
    position:relative;
}

.reply:first-of-type > .reply--name:after {
    content:':';
    display:inline;
}

.reply:not(:first-of-type) {
    background:{color:Reply};
    padding:10px;
    display:table;
    max-width:500px;
    {block:IfBorders}
    border:1px solid {color:Lines};
    {/block:IfBorders}
}

.post > *:last-child {
    margin-bottom:10px;
}

.notes {
    display:block;
    border-top:1px solid {color:Lines};
    margin:0;
    padding:10px 0;
    list-style-type:none;
}

.notes li {
    background:{color:Reply};
    padding:10px;
    margin:0;
    max-width:500px;
    display:table;
    {block:IfBorders}
    border:1px solid {color:Lines};
    {/block:IfBorders}
}

.notes li:not(:last-of-type) {
    margin-bottom:10px;
}

.notes img {
    display:none;
}

/* pagination */

.pagination {
    margin:10px 0;
    padding:10px;
    {block:IfBorders}
    border:1px solid {color:Lines};
    {/block:IfBorders}
    display:table;
    background:{color:Reply};
}

.pagination--current {
    font-weight:bold;
}

.pagination--infinite--container {
    display:none;
}

.pagination--infinite--container-1 {
    display:inline;
}

.pagination--infinite {
    color:{color:Link};
    text-decoration:underline;
    font-family:{font:Font};
    font-size:{text:Font Size}px;
    cursor:pointer;
}

.paginatoin--infinite:hover {
    color:{color:Link Hover};
}

</style>

</head>

<body>

<div class="wrapper">

    
<header class="page--header">
    
    <img src="{image:Banner}" class="header--banner" />
    
    <h1 class="page--title">/{Name}/ - {Title}</h1>

    <p class="page--description">{Description}</p>

</header>

<main class="posts">

{block:Posts}
 
<article class="post clearfix post-{PostType}">

    <header class="post--header">
    
    <p>
    

    {block:Title}<span class="post--title"> {Title} </span>{/block:Title}
    
    
test

    {/block:Date}
    
    </p>
    
    </header><!-- post-header -->
    
    <div class="post--content">
 
  


    </div>
    {/block:RebloggedFrom}

    
    </div>
 
</article>


{/block:Posts}

</main>
    
</div><!-- wrapper -->



</body>

</html>
