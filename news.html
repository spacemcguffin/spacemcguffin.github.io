<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#17121c">
  <title>Nerimon Archive Reader — First Twenty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #282226;
      --muted: #766c70;
      --paper: #f4ecdf;
      --paper-deep: #e8dccb;
      --paper-light: #fffaf2;
      --shell: #17121c;
      --shell-2: #24192a;
      --line: rgba(45,35,41,.16);
      --accent: #d85c82;
      --accent-2: #7768d9;
      --gold: #b69661;
      --shadow: 0 34px 100px rgba(0,0,0,.34);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 8%, rgba(216,92,130,.14), transparent 34rem),
        radial-gradient(circle at 90% 90%, rgba(119,104,217,.12), transparent 38rem),
        linear-gradient(145deg, var(--shell), var(--shell-2));
      color: var(--ink);
      font-family: "Manrope", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: .16;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.32'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    button, input { font: inherit; }
    button { color: inherit; }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      padding: 18px;
      gap: 18px;
    }

    .rail {
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(12,9,15,.54);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      color: white;
      backdrop-filter: blur(22px);
      overflow: hidden;
    }

    .rail-head {
      padding: 24px 22px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .brand {
      font-family: "DM Mono", monospace;
      font-size: .72rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.7);
    }

    .rail h1 {
      margin: 18px 0 8px;
      font-family: "Instrument Serif", serif;
      font-size: 3.3rem;
      line-height: .82;
      font-weight: 400;
      letter-spacing: -.04em;
    }

    .rail h1 em { color: var(--accent); font-weight: 400; }
    .rail-copy {
      margin: 14px 0 18px;
      color: rgba(255,255,255,.56);
      font-size: .78rem;
      line-height: 1.55;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.055);
      color: white;
      border-radius: 999px;
      padding: 11px 38px 11px 14px;
      outline: none;
    }

    .search input:focus {
      border-color: rgba(216,92,130,.75);
      box-shadow: 0 0 0 3px rgba(216,92,130,.12);
    }

    .search span {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.45);
    }

    .entry-count {
      margin-top: 12px;
      color: rgba(255,255,255,.4);
      font-family: "DM Mono", monospace;
      font-size: .66rem;
    }

    .timeline {
      min-height: 0;
      overflow-y: auto;
      padding: 8px 10px 24px;
      scrollbar-width: thin;
      scrollbar-color: rgba(216,92,130,.7) transparent;
    }

    .timeline::-webkit-scrollbar { width: 8px; }
    .timeline::-webkit-scrollbar-thumb {
      background: rgba(216,92,130,.6);
      border-radius: 999px;
    }

    .day-label {
      position: sticky;
      top: 0;
      z-index: 2;
      margin: 8px 0 4px;
      padding: 10px 10px 7px;
      background: rgba(20,14,24,.9);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,.42);
      font-family: "DM Mono", monospace;
      font-size: .62rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .timeline-entry {
      width: 100%;
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: white;
      text-align: left;
      padding: 13px 12px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      cursor: pointer;
      transition: .2s ease;
    }

    .timeline-entry:hover {
      background: rgba(255,255,255,.055);
    }

    .timeline-entry.active {
      background: linear-gradient(135deg, rgba(216,92,130,.22), rgba(119,104,217,.14));
      box-shadow: inset 0 0 0 1px rgba(216,92,130,.28);
    }

    .timeline-num {
      font-family: "Instrument Serif", serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .timeline-title {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: "Instrument Serif", serif;
      font-size: 1.15rem;
      line-height: 1;
    }

    .timeline-time {
      display: block;
      margin-top: 5px;
      color: rgba(255,255,255,.38);
      font-family: "DM Mono", monospace;
      font-size: .6rem;
      text-transform: uppercase;
    }

    .reader-shell {
      min-width: 0;
      min-height: 0;
      position: relative;
      background: var(--paper-deep);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .reader-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(91,64,45,.08), transparent 4%, transparent 96%, rgba(91,64,45,.08)),
        repeating-linear-gradient(0deg, transparent 0 29px, rgba(85,65,57,.035) 30px);
      z-index: 3;
    }

    .notebook {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(240px, .38fr) minmax(0, 1fr);
      position: relative;
    }

    .notebook::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 38%;
      width: 2px;
      transform: translateX(-1px);
      background: linear-gradient(to bottom, transparent, rgba(70,50,45,.18) 8%, rgba(70,50,45,.18) 92%, transparent);
      box-shadow: -12px 0 24px rgba(73,48,38,.06), 12px 0 24px rgba(73,48,38,.05);
      pointer-events: none;
      z-index: 4;
    }

    .index-page {
      padding: clamp(30px, 4vw, 64px);
      background:
        radial-gradient(circle at 10% 10%, rgba(255,255,255,.48), transparent 25rem),
        var(--paper);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .archive-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: "DM Mono", monospace;
      font-size: .68rem;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .archive-mark::before {
      content: "";
      width: 32px;
      height: 1px;
      background: var(--accent);
    }

    .entry-number {
      margin-top: auto;
      font-family: "Instrument Serif", serif;
      font-size: clamp(7rem, 14vw, 14rem);
      line-height: .7;
      letter-spacing: -.08em;
      color: rgba(216,92,130,.16);
    }

    .date-stamp {
      width: fit-content;
      margin-top: 28px;
      border: 2px solid rgba(160,74,94,.42);
      color: rgba(160,74,94,.72);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: "DM Mono", monospace;
      font-size: .68rem;
      letter-spacing: .09em;
      text-transform: uppercase;
      transform: rotate(-2deg);
    }

    .meta-grid {
      margin-top: 34px;
      display: grid;
      gap: 18px;
      border-top: 1px solid var(--line);
      padding-top: 22px;
    }

    .meta-label {
      display: block;
      font-family: "DM Mono", monospace;
      font-size: .59rem;
      text-transform: uppercase;
      letter-spacing: .11em;
      color: var(--muted);
    }

    .meta-value {
      display: block;
      margin-top: 5px;
      font-size: .82rem;
      line-height: 1.45;
    }

    .reading-page {
      min-width: 0;
      min-height: 0;
      background:
        radial-gradient(circle at 70% 0%, rgba(255,255,255,.72), transparent 28rem),
        var(--paper-light);
      display: flex;
      flex-direction: column;
      padding: clamp(28px, 4vw, 64px) clamp(26px, 5vw, 84px) 28px;
    }

    .reader-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-shrink: 0;
    }

    .reader-kicker {
      color: var(--accent);
      font-family: "DM Mono", monospace;
      font-size: .66rem;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .progress {
      width: 120px;
      height: 3px;
      background: rgba(40,34,38,.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      width: 5%;
      transition: width .25s ease;
    }

    .title {
      margin: 24px 0 22px;
      font-family: "Instrument Serif", serif;
      font-size: clamp(3rem, 6vw, 6.8rem);
      line-height: .86;
      letter-spacing: -.045em;
      font-weight: 400;
      flex-shrink: 0;
    }

    .divider {
      width: 74px;
      height: 1px;
      background: var(--gold);
      margin-bottom: 24px;
      flex-shrink: 0;
    }

    .entry-body {
      min-height: 0;
      overflow-y: auto;
      padding: 0 22px 42px 0;
      white-space: pre-wrap;
      font-family: "Instrument Serif", serif;
      font-size: clamp(1.18rem, 1.75vw, 1.48rem);
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) rgba(40,34,38,.08);
      overscroll-behavior: contain;
      mask-image: linear-gradient(to bottom, transparent, black 18px, black calc(100% - 28px), transparent);
    }

    .entry-body::-webkit-scrollbar { width: 10px; }
    .entry-body::-webkit-scrollbar-track {
      background: rgba(40,34,38,.055);
      border-radius: 999px;
    }
    .entry-body::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--accent), var(--accent-2));
      border-radius: 999px;
    }

    .reader-nav {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .reader-nav button {
      border: 0;
      background: transparent;
      cursor: pointer;
      font-family: "DM Mono", monospace;
      font-size: .68rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 8px 0;
    }

    .reader-nav button:disabled {
      opacity: .28;
      cursor: default;
    }

    .keyboard-hint {
      color: var(--muted);
      font-family: "DM Mono", monospace;
      font-size: .58rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(20,14,24,.88);
      color: white;
      border-radius: 999px;
      padding: 12px 16px;
      box-shadow: 0 12px 32px rgba(0,0,0,.28);
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        min-height: 100%;
        height: auto;
        grid-template-columns: 1fr;
        padding: 10px;
      }
      .rail {
        position: fixed;
        inset: 10px;
        z-index: 15;
        transform: translateY(calc(100% + 24px));
        transition: transform .32s ease;
      }
      body.timeline-open .rail { transform: translateY(0); }
      .mobile-toggle { display: block; }
      .reader-shell { min-height: calc(100vh - 20px); }
      .notebook {
        grid-template-columns: 1fr;
        height: calc(100vh - 20px);
      }
      .notebook::after { display: none; }
      .index-page {
        min-height: auto;
        padding: 22px 24px;
        border-bottom: 1px solid var(--line);
        flex-direction: row;
        align-items: center;
        gap: 18px;
      }
      .archive-mark, .meta-grid { display: none; }
      .entry-number {
        margin: 0;
        font-size: 3.8rem;
        line-height: .7;
      }
      .date-stamp {
        margin: 0 0 0 auto;
        font-size: .56rem;
      }
      .reading-page {
        min-height: 0;
        padding: 28px 22px 22px;
      }
      .title {
        font-size: clamp(2.8rem, 12vw, 5rem);
        margin-top: 18px;
      }
      .entry-body {
        font-size: 1.17rem;
        padding-right: 10px;
      }
    }

    @media (max-width: 560px) {
      .progress { width: 78px; }
      .keyboard-hint { display: none; }
      .reader-nav button { font-size: .62rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="rail" id="rail">
      <div class="rail-head">
        <div class="brand">Nerimon Diary Archive</div>
        <h1>The first <em>twenty.</em></h1>
        <p class="rail-copy">A compact archive reader for the opening entries, written between 2 and 4 September 2003.</p>
        <label class="search">
          <input id="searchInput" type="search" placeholder="Search entries…" aria-label="Search entries">
          <span>⌕</span>
        </label>
        <div class="entry-count" id="entryCount">20 entries</div>
      </div>
      <nav class="timeline" id="timeline" aria-label="Diary timeline"></nav>
    </aside>

    <main class="reader-shell">
      <section class="notebook">
        <aside class="index-page">
          <div class="archive-mark">Archive copy</div>
          <div class="entry-number" id="entryNumber">01</div>
          <div class="date-stamp" id="dateStamp">02 Sep 2003</div>
          <div class="meta-grid">
            <div>
              <span class="meta-label">Original file</span>
              <span class="meta-value" id="fileName"></span>
            </div>
            <div>
              <span class="meta-label">Entered</span>
              <span class="meta-value" id="entered"></span>
            </div>
            <div>
              <span class="meta-label">Visibility</span>
              <span class="meta-value" id="visibility"></span>
            </div>
          </div>
        </aside>

        <article class="reading-page">
          <div class="reader-top">
            <div class="reader-kicker" id="readerKicker">Diary entry 01</div>
            <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
          </div>

          <h2 class="title" id="entryTitle"></h2>
          <div class="divider"></div>
          <div class="entry-body" id="entryBody" tabindex="0"></div>

          <nav class="reader-nav" aria-label="Entry navigation">
            <button id="prevEntry">← Previous entry</button>
            <span class="keyboard-hint">Use ← → to move between entries</span>
            <button id="nextEntry">Next entry →</button>
          </nav>
        </article>
      </section>
    </main>
  </div>

  <button class="mobile-toggle" id="mobileToggle">Browse entries</button>

  <script>
    const entries = [{"num": 1, "title": "My first entry ^__^", "filename": "one.html", "date": "Tuesday, Sept. 02, 2003", "time": "11:11 am", "visibility": "Public", "body": "MY FIRST ENTRY ^__^\nHa!! Look at the time - 11:11! One one one one! *big grin*\nMoving on . . . so, this is my diary/weblog/slambook. I'll call it a slambook. Yeah, I like that, and I'm sure much slamming wll be taking place.\nSo, look forward to my entries one and all,\nAlex/Boo-chan/Nerimon\nWe'll go with Boo-chan. Yeah I like that."}, {"num": 2, "title": "Life As It Stands - Vol. 1; Kim, Crystal and Sash", "filename": "two.html", "date": "Tuesday, Sept. 02, 2003", "time": "11:22 am", "visibility": "Public", "body": "LIFE AS IT STANDS - VOL. 1; KIM, CRYSTAL AND SASH\n\nWell, my life is all messed at the moment. Last night Kim and I had a fight because of the fact that she doesn't think I love her, and she doesn't trust me. I was going to break up with her but I didn't because I didn't want to - I thought I could just forget she ever said it and move on. However, it doesn't help when she keeps reminding me. I feel this pain every time she says it, I hate it. So I told her that, and also that she doesn't sound too bothered if we stay together or not.\n\nI sent that last night - it's now 11:25 and she hasn't replied yet. *shrugs* Sla. Right now, I'm not too bothered whether or not Kim and I stay together - the only thing is, we slept together, and I guess it hurts to think that the person I lost my virginity to isn't the one for me. Or maybe she is, and she doesn't even realise - I love her so much, but the thing that splits us up is that she doesn't know. I want to be with her and I don't want this to end, but sometimes these things just happen I guess.\n\nNow on to the girl that's making me wonder whether Kim and I are right for each other - the lovely Crystal-hime (who, by some strange twist of fate is also called Kim. But so there's no confusion I'll call her Crystal). She's like nothing I've ever known, and I can honestly say that I love her, truly and deeply. So, I'm thinking this isn't a good thing for Kim and I? I can't even be with Crystal - I've had 3 online relationships, but never any with a girl outside of this country. I wouldn't ever be able to see her, and it probably wouldn't last because of this distance; so why do I long to be with her? I want to tell her that, but I don't know how she'd take it; I've made her feel pretty down and I don't want to share all of my feeling with her. It's like, say you dangled a steak in front of a dog, and then you ate the steak in front of it? It's like that. I can easily tell her that my heart is aching to be with her, close to her, being her boyfriend, but I can't do anything about it (my feeling is the steak. But that would make Crystal a dog . . . oh, bad analogy). It's hard to explain; I guess I'll just see where the wind takes me (Mr. Free Spirit here *waves*). I wanna try and write some sort of song or poem about this but I'm not at home, and I can't really write in other places cos I have no writing paper. I said I'd try and find a spell to make this easier (just call me Willow the Witchy Guy) but, again I'm not at home, where all my spells are.\n\nLastly, the ever-erratic ex-girlfriend Sasha emailed me the other day. No clue why, she thought I was a loverat and that I was 'manipulative and cruel'. Basically her best mate told Sash I'd been hitting on her, and (obviously, being her best friend) Sash believed her. Her best mate was of course lying, but anyway she had a lot of pent up anger she wanted to let out. And then I replied, and she forgave me. She said she was thinking about being friends with me but that it'd take some time. And then I didn't hear anything else from her . . . *shrugs* Ah well, I guess thse things just happen, like when I lost touch with 'the b.o. bitch' Phillipa.\n\nWell, I guess this is it for now - bye bye,\nBoo-chan"}, {"num": 3, "title": "Cardshows, Money, Games and School", "filename": "three.html", "date": "Tuesday, Sept. 02, 2003", "time": "11:46 pm", "visibility": "Public", "body": "CARDSHOWS, MONEY, GAMES AND SCHOOL\n\nAck. Just looked at the date. Its exactly 8 days until I go back to miserable school. :-( Just gets you down, dunnit?\n\nStill, I have some stuff to look forward to. On Saturday I'm attending my 3rd Cardshows Yu-Gi-Oh tournament. I'll be using my Beatdown deck, which will be fun since I have several new kick-ass cards like Fiber Jar, Mirror Force etc. I took out Obelisk cos they won't let me use him now, and I also took out The Masked Beast to save card space - I have other ways of getting strong monsters on the field. So now I want Destiny Board (for my Exodia deck), Ring of Destruction, Jinzo and Tyrant Dragon (some really nice duellist in Wales is buying a Tyrant Dragon for me! How nice *grin*). I have £60 for Cardshows, so I'm gonna buy The Winged Dragon of Ra and, if it's in stock, Ring of Destruction. Any money I have left, I'll be saving towards two great new games coming out for PS2 soon; Buffy the Vampire Slayer: Chaos Bleeds and Harry Potter: Quidditch World Cup. I play-tested them both at the Playstation Exprience and they're brilliant.\n\nOK, I'm done now. Will continue to have dreamy thoughts of Crystal-hime. Also, I'm hungry. *wanders off to have dreamy thoughts of Crystal while making cereal*\n\nBoo-chan"}, {"num": 4, "title": "Waiting for mail; Pojo delight ^__^", "filename": "four.html", "date": "Tuesday, Sept. 02, 2003", "time": "8:24 pm", "visibility": "Public", "body": "WAITING FOR MAIL; POJO DELIGHT ^__^\n\nI'm just sitting on the Net, waiting for a reply fom Crystal . . . will probably have to read it tomorrow morning like I did last night. Have been talking to Kim about what it would be like if she had 9 orgasms . . . can't remember what got us on to that topic @_@. Anyway I got some fan mail from a guy who agreed with a topic I sent to Pojo about Upper Deck going too fast with their Yu-Gi-Oh releases; hold on, I didn't know that'd been posted! I checked Pojo and all 3 of my tips have been posted, including my massive essay on psychology. Me so pleased, so proud!! I emailed Sam to tell him about it, he probably won't look. I want him to see my site too . . . I don't know if he's OK or not cos I haven't spoken to him recently. I miss my Sam-san :-( I know that sounded gay - what can you do? What, I can't miss a best friend who I haven't spoken to for a month, even though he lives 5 minutes' walk away? I'm lazy, email is easier.\n\nAnyways, I shall continue my email sit-in for Crystal's msg. Byeeee!\n\nBoo-chan"}, {"num": 5, "title": "Crystal-hime", "filename": "five.html", "date": "Tuesday, Sept. 02, 2003", "time": "11:57 am", "visibility": "Public", "body": "CRYSTAL-HIME\n\nWell, it's almost midnight - time's flying here at Jamie's, I wanna stay so much longer and I can't believe it's now 7 days till my wonderful life at school reawakens *unenthusiastic smile*. I just had another exhilarating ride on Jamie's bike - and all I could think about was Crystal. I don't know why, but I wanted to talk to her and take care of her, so when I got home I checked my email and her blog and found she had felt ill, said she had a fever. I'm worried that I am a major reason for this, because she said she feels ill when she sees an email from me. I've had some sweet commnts from girls but never that ^__^ I know it's not her fault, but I suggested that we maybe stop talking until she feels a bit better; I doubt she'll go for that idea, and it's not like I wanna stop talking to her anyway, but I don't want to be the cause of her pain. She doesn't deserve it. Anyway, I've emailed her again and said I'll just write here till she wants to talk. So, this is me, writing *waves*. I hope she feels better soon and that she can still talk to me, because I am completely, head-over-heels in love and I don't want to stop contacting her."}, {"num": 6, "title": "Memoirs of a tired, lovesick fool", "filename": "six.html", "date": "Wednesday, Sept. 03, 2003", "time": "12:15 am", "visibility": "Public", "body": "MEMOIRS OF A TIRED, LOVESICK FOOL\nHi there, my name's Alex Day and I'm a lovesick fool. *people in the room applaud* Yeah, I've been a lovesick fool for about a week now - what should I do?\n\nOf course: wait till you're really tired at some stupid hour of the morning, and try to write a song about it! Clever.\n\nSo here we go, my song, Such A Fool:\n\n[V1]\nI never thought it would be this way\nI never thought I could love you so much\nAnd it hurts me inside that you're so far away\nI just want to feel your gentle, warm touch\n\n[C]\nIt's weird, I feel like such a fool\nYou're so close to me, yet so far from me\nI'm trying to be calm, trying to act cool\nBut my feelings show, and I feel like such a fool\n\n[V2]\nI never thought I could feel so numb\nI never thought my love was so true\nAnd it hurts me inside that nothing can be done\nI just want to be with you\n\n[C]\nIt's weird, I feel like such a fool\nYou're so close to me, yet so far from me\nI'm trying to be calm, trying to act cool\nBut my feelings show, and I feel like such a fool\n\n[MIDDLE-8]\nI guess I'm just a fool\nIt's just the way I am\nBut I try and keep my cool\nAnd it doesn't work\nI guess I'm just a fool\nI'm trying to be a man\nBut I just can't keep my cool\nIt just doesn't work\n\n[C]\nIt's weird, I feel like such a fool\nYou're so close to me, yet so far from me\nI'm trying to be calm, trying to act cool\nBut my feelings show, and I feel like such a fool\n\nWow, so scary - I'll have to write songs when I'm tired more often. This is the best song I have ever written, and I already have a melody in my head. So strange how things work out, huh? Anyway, Crystal if you're reading this, this is my feelings. I have a girlfriend, I love you, it's all so messed up and I feel like such a fool for hurting you the way I have. Well, I guess we are meant for each other, what with me being such a fool and you being another loser ^__^ Anyways - bye,\nBoo-chan"}, {"num": 7, "title": "The promise of a new day.", "filename": "seven.html", "date": "Wednesday, Sept. 03, 2003", "time": "12:32 am", "visibility": "Public", "body": "THE PROMISE OF A NEW DAY.\n\nWell it's now Wednesday, and I have the promise of a new day ahead of me. Who knows what wonderful surprises Jamie will have in store - he probably doesn't even know himself. Still having my little email sit-in, waiting for Crystal's msg. Crystal-hime, if you're reading this: hi!! *waves* Email me!\n\nOK, so, what to talk about . . .oh yeah, I've decided to spend my money on Ra and Ring of Destruction if they have them. If not, then I'll just save my money on Buffy or Harry. Dunno which, whatever I see at the shop first I guess. Probably Buffy, that's more fun. I'll get Harry for Gamecube so I can play it at my nan's house. If I do get RoD then I'll have to save a bit longer . . . but sla.\n\nWill probably find something else that's dull to talk about while I wait for Crystal's msg. Byeeee!\n\nBoo-chan"}, {"num": 8, "title": "Witchcraft", "filename": "eight.html", "date": "Wednesday, Sept. 03, 2003", "time": "12:42 am", "visibility": "Public", "body": "WITCHCRAFT\n\nFoe those of you that don't understand, Witchcraft (or Wicca) is a RELIGION. Not some spiritual thing, that anyone can do. Nor is it evil. We don't worship Satan; we don't even believe Satan exists. And, we don't do black magick. Well, some of us do but I don't; I only believe in white magick (to quote the Wiccan Rede; 'an' it harm none, do what ye will'. This is the Wiccan's most important rule; do what you like so long as it doesn't harm others). So here is a spell I'm writing off the top of my head (more creative writings from tired ol' me) for . . . dunno, we shall see when we get there:\n\nMy Lord and Lady, fair and true\nI wish to give myself to you\nPlease aid me when I cast this spell\nAnd help me to focus so it works well;\n\nI cast this spell to ease my pain\nI cannot handle this feeling again\nPlease give me the courage to face my fears\nAnd take away the sadness and tears.\n\nAs I speak to you, I know you can see\nI want, more than anything, to be\nSomeone who can move on and cope with life\nI want no worries, no trouble, no strife\n\nI close this spell now, and I hope you've heard\nI hope you take my spoken words\nChannel my energy and protect me with light\nSo I can feel my inner might.\n\nA spell to ease pain and make yourself more positive *bows*\n\nBoo-chan"}, {"num": 9, "title": "Bed . . . and surprisingly, Crystal", "filename": "nine.html", "date": "Wednesday, Sept. 03, 2003", "time": "1:03 am", "visibility": "Public", "body": "BED . . . .AND SURPRISINGLY, CRYSTAL\n\nIs it possible? Crystal-hime, I think I talk about you in my blog more than you talk about me in yours! I'm not trying to do it on purpose, just I have to think of something to write about while I wait for your msg and, strangely, you always come to mind.\n\nAnyway I'm so tired now so I'm gonna have to filter out these creative juices that I didn't even know were there at this time of the morning. So, I'll wake up in the morning and read/reply to Crystal's email, then probably spend the rets of the day writing about it. Sla. Night-night.\n\nBoo-chan"}, {"num": 10, "title": "11:11 - Crystal Update", "filename": "ten.html", "date": "Wednesday, Sept. 03, 2003", "time": "11:11 am", "visibility": "Public", "body": "11:11 - CRYSTAL UPDATE\n\nHey, it's 1111 again! *giggles* One one one one! Anyway, that means I've had my diary for exactly ONE DAY!!! *fanfares roll*\n\nAnyways I read Crystal's blog (cos I still haven't got an email from her *sulks*) and she said that she felt much better, which has made me feel really happy ^__^ I kept having these little pangs inside me when I knew she was upset; call it a sixth sense or something. But anyway now she's all 'yay' again! And then she can feel well enough to EMAIL ME!!!! *subtle clue* Nah, 'tis OK, I can wait for koibito's email. (Koibito - One I love)\n\nSo, yeah. Me happy! And I have to re-read my spell that I wrote last night; I can't remember any of it. I just re-read Such a Fool, it is pretty good! And I emailed it to Elanna and she said it had lots of emotion in it. 'Tis true, I guess.\n\nByeeeeee!\nBoo-chan"}, {"num": 11, "title": "Jamie's all asleep-did!", "filename": "eleven.html", "date": "Wednesday, Sept. 03, 2003", "time": "11:25 am", "visibility": "Public", "body": "JAMIE'S ALL ASLEEP-DID!\n\nJamie's asleep-did-ee-dudlled! It's weird to wake up and find him not there, but I looked and he was all curled up on his bed. Awww :-)\n\nThat wasn't really worth one entry, was it? Ah well, sla.\n\nBoo-chan"}, {"num": 12, "title": "Religious stuff (and general fun)", "filename": "twelve.html", "date": "Wednesday, Sept. 03, 2003", "time": "7:12 pm", "visibility": "Public", "body": "RELIGIOUS STUFF (AND GENERAL FUN)\n\n'Don't be fooled by the cross that I've got, I'm still, I'm still Jesus from the block'. I just saw that on a banner and it really made me laugh so I thought I'd post it. I thought I'd put this religious joke too, cos it made me laugh: (warning; if you're not a Wicca, you probably won't get this)\n\nA Pagan in Hell\n\nBy: Pendragon\n\nA Pagan dies and, to his great surprise, he finds himself standing before some pearly gates. St. Peter asks him, \\\"May I help you?\\\" The Pagan asks, \\\"Where am I?\\\"\n\nPeter says, \\\"You're at the gates of heaven.\\\"\n\nThe Pagan says, \\\"But I don't believe in heaven.\\\"\n\nPeter frowns at him. \\\"You're one of those Pagans, aren't you?\\\"\n\n\\\"Yes. I believe I'm in the wrong place; I'm supposed to go to Summerland.\\\"\n\nPeter says, \\\"Sorry. We took over Summerland, and it's temporarily closed for remodeling.\\\"\n\n\\\"What should I do now?\\\"\n\nPeter says, \\\"Well, since we don't allow Pagans in heaven, you have to go to hell. Sorry. Just follow that path that leads downward and to the left.\\\"\n\nThe Pagan walks down to hell, where the gates are standing open. He walks in and finds beautiful meadows, happy animals, and clear streams of water.\n\nHe walks on in and begins exploring, and after a few minutes a courtly gentleman walks up to him and bows politely. \\\"Hello, I'm Satan. You must be the guy that St. Peter phoned me about. Are you a Pagan?\\\"\n\n\\\"Yes, I am. What's going to happen now?\\\"\n\nSatan says, \\\"Well, the fishing's pretty good, if you enjoy that sort of thing. There's a little refreshment stand down the road. And I believe the Pagan meeting grounds are right over the next hill.\\\"\n\nSuddenly, a hole opens up in the sky above, and a yawning chasm opens directly underneath it. The stench of sulphur fills the air. Hundreds of screaming, tortured souls drop down into the flaming pit, which immediately closes up with a thud.\n\nThe Pagan, hardly believing what he just saw, asks Satan, \\\"And what was THAT ???\\\"\n\nSatan rolls his eyes. \\\"Oh, just ignore them. They're Christians; they wouldn't have it any other way.\\\"\n\nAlso, did you know that 'Sucks Large Portions of Ass' translated into German and back into English again comes out as 'Sucks Large Sections of the Donkey'? You learn something new every day.\n\nBoo-chan"}, {"num": 13, "title": "My rant on witchcraft and stupid people", "filename": "thirteen.html", "date": "Wednesday, Sept. 03, 2003", "time": "9:47 pm", "visibility": "Public", "body": "MY RANT ON WITCHCRAFT AND STUPID PEOPLE\n\nI've been surfing around the Net and I'm just about sick of people saying that witchcraft has anything to do with Satan. SATAN DOES NOT EXIST. OK? What's the point of creating an entity to represent evil? It just makes the fear stronger if you have a physical deity composed of fear, hatred and death. Wicca means that there is no evil deity you can blame all of your problems on; if you get tempted to do something you shouldn't, you can't use Satan as a crappy excuse; with Wicca, we respect and understand that our wrongdoing is our own. We are responsible for our own actions, and cannot blame others for what we do. So, if anyone apart from Crystal actually reads this (doubtful since I haven't told anyone else) please get your facts straight; Wicca is not Satanism.\n\nAlso, white magick is good. White magick means that you believe in the God and Goddess, and harnessing the power of nature, the world around you, the elements and the two deities to make the world a better place, or to help your life and the life of others for the better. Christians believe that God is some force that created the Universe; for Wiccans, the Lord and Lady IS the Universe, and everything in it. The Universe was not created, it has been here before time began, and so has the Lord and Lady.\n\nBlack magick has nothing to do with the beliefs of the God and Goddess; it is about using your own power and harnessing it. Black magick is stronger, you do not rely on nature or the God or Goddess or anyone else except you, which can make you an incredibly powerful black sorceror. Since black magick is not tied with religion, they don't follow the rules of the Wiccan Rede (an' it harm none, do what ye will). This means they are quite willing to perform magickal spells and rituals which could harm others. Black sorcerors summon individual spirits that have their own special abilities to harm others (just so we're clear, black magick has nothing to do with Satanism either). The path of the black magickian is tempting; infinite power could be yours if you followed this path, and I certainly have trouble resisting. However, I like being tied down by the Rede, being restricted back; it stops my power from being too great, it keeps me in check to a point. Besides, what with us being a weak species, too many people have chosen the path of the black arts and are wreaking havoc upon the world; it is my job to try and stop it, not make it worse.\n\nBoo-chan"}, {"num": 14, "title": "A warning spell", "filename": "fourteen.html", "date": "Wednesday, Sept. 03, 2003", "time": "10:12 pm", "visibility": "Public", "body": "A WARNING SPELL\n\nYes, I got this off a black magick site; still, I like this because it doesn't cause ill intent, it just warns people of what I might do if they mess with me. And, they don't know that I'd never do black magick, so the warning should go down pretty well :-) Plus, I like this cos the words are powerful.\n\nSend this warning to the one of my intent\nMake them shiver and shake with lament\nMake sure they know I will give them much worse\nIf they hurt me again, I shall give them a curse\nMake them hear in their head, this verse\nAnd know it is me that is chanting the words\n\nBlood turn black and flesh turn Blue,\nI will curse you if you force me too.\nI`ll swoop down on you with no disguise,\nI`ll call down the plague of flies.\nBlood go black and flesh go blue\nEvil hit me and went back to you\nMy soul clean and yours on fire\nYou fuck with a witch, you'll burn on a pyre"}, {"num": 15, "title": "The Rede", "filename": "fifteen.html", "date": "Wednesday, Sept. 03, 2003", "time": "10:44 pm", "visibility": "Public", "body": "THE REDE\n\nFor those who are interested, here is the Wiccan Rede:\n\nTHE WICCAN REDE\nAuthor unknown\n\nBide these Wiccan Laws you must\nWith perfect love and perfect trust\nLive and let live\nFairly take and fairly give\nCast the circle thrice about\nTo keep all evil spirits out\nTo bind a spell every time\nLet the spell be spoken in rhyme\nNine wood `neath and cauldron go\nBurn them fast and then slow\nWiddershins go by waning moon\nChanting out the baleful tune\nWhen the Lady`s moon is new\nKiss her hands to her times two\nWhen the moon rides at her peak\nThen your heart`s desire seek\nHeed the Northwind`s mighty gale\nLock the door and trim the sail\nWhen the wind comes from the South\nLove will kiss you in the mouth\nWhen the wind blows from the West\nDeparted souls will have no rest\nWhen the winds blow from East\nExpect the new and set the feast\nNine wood `neath and cauldron go\nBurn them fast then slow\nElderwood,the lady`s tree\nBurn it not or cursed you`ll be\nWhen the wheel begins to turn\nSoon the Beltane fires will burn\nWhen the wheel has turned to Yule\nLight the log the Horned one rulse\nTeaching flower bush and tree\nBy the Lady Blessed Be\nWhere the rippiling waters go\nCast the stone and truth you`ll know\nWhen ye have and hold a seed\nHarken not to other`s greed\nWith a fool no season spend\nOr be counted as his friend\nMerry meet and Merry part\nBright the cheeks and warm the heart\nMind the Threefold Law you must\nThree times bad and three times good\nWhen misfortune is anow\nWear the Star upon thy brow\nTrue in love ye must ever be\nLest thy love be faulse to thee\nThese eight words be rede fulfill\nAnd ye harm none do what thou will."}, {"num": 16, "title": "Bloody viruses", "filename": "sixteen.html", "date": "Wednesday, Sept. 03, 2003", "time": "11:06 pm", "visibility": "Public", "body": "BLOODY VIRUSES\n\nI've had two or three viruses sent to me today and they're starting to get on my nerves. What's the point? I found out I was immune to the MSBlaster virus thogh, which is pretty cool. It's cos it only targets Windows 2000, ME and XP, and I'm Windows 98. So, for the firts time, my computer being old is a good thing :-) Either that or Microsoft haven't yet developed a patch for it, which could happen. So, yeah.\n\nBoo-chan"}, {"num": 17, "title": "Ack.", "filename": "seventeen.html", "date": "Wednesday, Sept. 03, 2003", "time": "11:23 pm", "visibility": "Public", "body": "ACK.\n\nI feel ill :-( I had really bad stomach cramps, and I'm trying to convince myself it's not black magick (it wouldn't surprise me if someone was cursing me as a way to show me the power I was missing out on by choosing the good path). Further proof in the fact that my internet code was bh666nj. Great, nothing like the digits of Satan to put you right at ease. However, Jamie had the same pain a couple of nights ago so I'm gonna blame it on his wife's cooking, and leave it at that.\n\nCrystal - I know your pain now, koibito *smiles sadly*\n\n*wishes Crystal were here* You know when you long for someone to put your arms round, give a gentle, sweet kiss to and then fall asleep with? Well, I want that, and I want it to be with my Crystal-hime. *stomps around* And I want it now!! *pouts*\n\nSla, I guess this is just the way of things; the object of your affections always has to be on the other side of the world (sorry in advance for sounding so British) - bloody hell.\n\nBoo-chan"}, {"num": 18, "title": "My philosophical quote of the evening", "filename": "eighteen.html", "date": "Wednesday, Sept. 03, 2003", "time": "11:25 pm", "visibility": "Public", "body": "MY PHILOSOPHICAL QUOTE OF THE EVENING\n\nMy philosophical quote for this evening, taken from a Diaryland ad banner; it's so much easier to get out of bed when the house is on fire.\n\nBoo-chan"}, {"num": 19, "title": "Crystal-koibito", "filename": "nineteen.html", "date": "Thursday, Sept. 04, 2003", "time": "12:08 am", "visibility": "Public", "body": "CRYSTAL-KOIBITO\n\nHee, 'tis strange - it turns out Crystal's email provider is being stupid, so it won't let her reply to my emails. So, we're just reading each other's diary entries and then writing about them in our ones :-) Heh. This did make me chuckle though:\n\n'It's bad enough my stupid computer is in Chinese (I quote my dad, \\\"A chinese computer will make you learn chinese\\\"'\n*giggles* I feel for you, my darlin' - it must be really annoying for ya.\n\nApparently her sister's been telling her that we have a cold climate here in the winter (when koibito will hopefully be coming here!!! *cheers, preys and casts many wish spells*) - heh, we have a cold climate. This is England, we are always cold. However, it is pretty cold in the winter - I don't know what my Crystal is so worried about though. I will put my arms round her and we can snuggle together, and my love will keep her warm :-) *pictures romantic scene* Yeah.\n\nTo my koibito - here, I can be your warmth, the one who will take care of you the one who will give you all the love you require; and when we are apart, I'm just an email or a diary entry away.\n\nBoo-chan"}, {"num": 20, "title": "Entry no. 20 - guess what it's about? ^_^", "filename": "twenty.html", "date": "Thursday, Sept. 04, 2003", "time": "12:42 am", "visibility": "Public", "body": "ENTRY NO. 20 - GUESS WHAT IT'S ABOUT? ^_^\n\nYeppers - Crystal posts another entry and I post another one here in response. Now, I'm kinda offended at the moment cos she said:\n\n'I'll just sit back, listen to my CD, practice for the talent show and think about Aleh-chan like the loser I am ^^;'\n\nSo what, thinking about me makes you a loser? *sulks*\n\nI know she didn't mean it like that though, I'm just being my silly self. Sla.\n\nI can't believe she said she'll be singing for me in her talent show - that is so sweet. I'm so touched *blushes and feels special* Koibito, if you're there; do your best and know that I'm real proud of ya! Knock 'em dead sugar, I have faith in you :-D\n\nI really wanna see her now, after being so close to her online it'd be so nice to be with her IRL. I mean, it wouldn't be spectacular; we'd just go out places, do normal things. But at the moment it seems like I would give anything to be with her, and if I could steal just a few minutes I would.\n\nLOL - maybe when we're finally together, we can write some joint entries and post the same entry in both our blogs, with both of us writing on it ^__^ Yeah.\n\nBoo-chan"}];
    const timeline = document.getElementById('timeline');
    const searchInput = document.getElementById('searchInput');
    const entryCount = document.getElementById('entryCount');
    const entryBody = document.getElementById('entryBody');
    let activeIndex = 0;
    let filtered = [...entries];

    const shortDate = date => date
      .replace(/^[A-Za-z]+,\s*/, '')
      .replace('Sept.', 'Sep')
      .replace(',', '');

    const groupDate = date => date.replace(/^[A-Za-z]+,\s*/, '');

    function renderTimeline() {
      const query = searchInput.value.trim().toLowerCase();
      filtered = entries.filter(entry =>
        !query || `${entry.title} ${entry.body}`.toLowerCase().includes(query)
      );

      entryCount.textContent = `${filtered.length} ${filtered.length === 1 ? 'entry' : 'entries'}`;
      let lastDate = '';
      timeline.innerHTML = filtered.map(entry => {
        const label = groupDate(entry.date);
        const day = label !== lastDate ? `<div class="day-label">${label}</div>` : '';
        lastDate = label;
        return `${day}
          <button class="timeline-entry ${entry.num === entries[activeIndex].num ? 'active' : ''}" data-num="${entry.num}">
            <span class="timeline-num">${String(entry.num).padStart(2, '0')}</span>
            <span>
              <span class="timeline-title">${entry.title}</span>
              <span class="timeline-time">${entry.time}</span>
            </span>
          </button>`;
      }).join('');

      timeline.querySelectorAll('.timeline-entry').forEach(button => {
        button.addEventListener('click', () => {
          const num = Number(button.dataset.num);
          activeIndex = entries.findIndex(entry => entry.num === num);
          updateReader();
          renderTimeline();
          document.body.classList.remove('timeline-open');
          document.getElementById('mobileToggle').textContent = 'Browse entries';
        });
      });
    }

    function updateReader() {
      const entry = entries[activeIndex];
      document.getElementById('entryNumber').textContent = String(entry.num).padStart(2, '0');
      document.getElementById('dateStamp').textContent = shortDate(entry.date);
      document.getElementById('fileName').textContent = entry.filename;
      document.getElementById('entered').textContent = `${entry.date} · ${entry.time}`;
      document.getElementById('visibility').textContent = entry.visibility;
      document.getElementById('readerKicker').textContent = `Diary entry ${String(entry.num).padStart(2, '0')}`;
      document.getElementById('entryTitle').textContent = entry.title;
      entryBody.textContent = entry.body;
      entryBody.scrollTop = 0;
      document.getElementById('prevEntry').disabled = activeIndex === 0;
      document.getElementById('nextEntry').disabled = activeIndex === entries.length - 1;
      document.getElementById('progressBar').style.width = `${((activeIndex + 1) / entries.length) * 100}%`;
      document.title = `${entry.title} — Nerimon Archive`;
    }

    function step(direction) {
      const next = activeIndex + direction;
      if (next < 0 || next >= entries.length) return;
      activeIndex = next;
      updateReader();
      renderTimeline();
    }

    searchInput.addEventListener('input', renderTimeline);
    document.getElementById('prevEntry').addEventListener('click', () => step(-1));
    document.getElementById('nextEntry').addEventListener('click', () => step(1));

    window.addEventListener('keydown', event => {
      if (event.target.matches('input')) return;
      if (event.key === 'ArrowLeft') step(-1);
      if (event.key === 'ArrowRight') step(1);
    });

    document.getElementById('mobileToggle').addEventListener('click', () => {
      const open = document.body.classList.toggle('timeline-open');
      document.getElementById('mobileToggle').textContent = open ? 'Close entries' : 'Browse entries';
    });

    renderTimeline();
    updateReader();
  </script>
</body>
</html>
