<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#03020b">

  <title>lewis.lc</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Google+Sans+Flex:opsz,wght@6..144,300..700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --pink: #ff32d2;
      --purple: #a855f7;
      --blue: #4ba3ff;
      --cyan: #55d8ff;
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(241, 224, 255, 0.82);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #03020b;
    }

    body {
      min-height: 100svh;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: "Google Sans Flex", system-ui, sans-serif;
      background: #03020b;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -3%;
      z-index: -5;

      background:
        linear-gradient(
          rgba(2, 1, 10, 0.12),
          rgba(2, 1, 10, 0.2)
        ),
        url("/images/nebula.png") center center / cover no-repeat;

      transform: scale(1.04);

      animation:
        nebula-breathe 24s ease-in-out infinite alternate;

      will-change: transform;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -4;
      pointer-events: none;

      background:
        radial-gradient(
          circle at center,
          transparent 18%,
          rgba(2, 1, 10, 0.12) 58%,
          rgba(2, 1, 10, 0.72) 100%
        ),
        linear-gradient(
          to bottom,
          rgba(1, 0, 8, 0.1),
          rgba(1, 0, 8, 0.34)
        );
    }

    @keyframes nebula-breathe {
      from {
        transform:
          scale(1.04)
          translate3d(-0.4%, -0.3%, 0);
      }

      to {
        transform:
          scale(1.085)
          translate3d(0.5%, 0.4%, 0);
      }
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.035;

      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
    }

    main {
      display: grid;
      place-items: center;
      min-height: 100svh;
      padding: 32px;
    }

    .landing {
      width: min(100%, 760px);
      text-align: center;
      transform: translateY(-1vh);

      animation:
        arrive 1.1s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes arrive {
      from {
        opacity: 0;
        transform:
          translateY(18px)
          scale(.985);
        filter: blur(8px);
      }

      to {
        opacity: 1;
        transform:
          translateY(-1vh)
          scale(1);
        filter: blur(0);
      }
    }

    h1 {
      margin: 0;

      color: #fff;

      font-size: clamp(3.2rem, 9vw, 6.3rem);
      font-weight: 350;
      line-height: .95;
      letter-spacing: -0.065em;

      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.8),
        -10px 0 26px rgba(255, 39, 211, 0.58),
        10px 0 28px rgba(63, 136, 255, 0.62),
        0 0 65px rgba(139, 71, 255, 0.44);
    }

    .intro {
      margin: 30px 0 0;

      color: var(--muted);

      font-family: "Geist Pixel", monospace;
      font-size: clamp(.82rem, 1.7vw, 1.05rem);
      line-height: 1.6;
      letter-spacing: .12em;

      text-shadow:
        0 0 10px rgba(255, 67, 214, 0.48),
        0 0 18px rgba(91, 116, 255, 0.3);
    }

    .divider {
      width: 74px;
      height: 2px;
      margin: 39px auto 35px;

      border-radius: 999px;

      background:
        linear-gradient(
          90deg,
          var(--pink),
          #b95cff 48%,
          var(--blue)
        );

      box-shadow:
        0 0 8px rgba(255, 50, 210, 0.92),
        0 0 22px rgba(93, 115, 255, 0.8);
    }

    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 26px;
    }

    .link {
      position: relative;

      display: inline-flex;
      align-items: center;
      gap: 9px;

      padding: 5px 4px;

      color: rgba(240, 219, 255, 0.95);

      font-family: "Geist Pixel", monospace;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      letter-spacing: .08em;
      text-decoration: none;

      text-shadow:
        0 0 7px rgba(255, 44, 210, 0.78),
        0 0 16px rgba(85, 117, 255, 0.65);

      transition:
        color 180ms ease,
        transform 180ms ease,
        text-shadow 180ms ease;
    }

    .link::after {
      content: "";

      position: absolute;
      right: 0;
      bottom: -6px;
      left: 0;

      height: 1px;

      background:
        linear-gradient(
          90deg,
          var(--pink),
          var(--blue)
        );

      box-shadow:
        0 0 10px rgba(142, 73, 255, 0.85);

      transform: scaleX(0);
      transform-origin: center;

      transition:
        transform 210ms ease;
    }

    .link:hover,
    .link:focus-visible {
      color: #fff;

      outline: none;

      transform: translateY(-2px);

      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.75),
        0 0 18px rgba(255, 40, 210, 0.9),
        0 0 28px rgba(69, 143, 255, 0.82);
    }

    .link:hover::after,
    .link:focus-visible::after {
      transform: scaleX(1);
    }

    .arrow {
      display: inline-block;

      font-family: "Google Sans Flex", sans-serif;
      font-size: .95em;

      transform: translateY(-1px);

      transition:
        transform 180ms ease;
    }

    .link:hover .arrow,
    .link:focus-visible .arrow {
      transform: translate(3px, -4px);
    }

    @media (max-width: 640px) {
      main {
        padding: 24px;
      }

      .landing {
        transform: translateY(-2vh);
      }

      .intro {
        margin-top: 24px;
        letter-spacing: .08em;
      }

      .divider {
        margin: 31px auto 29px;
      }

      nav {
        gap: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="grain" aria-hidden="true"></div>

  <main>
    <section class="landing" aria-labelledby="site-title">
      <h1 id="site-title">lewis.lc</h1>

      <p class="intro">
        deleted all my social media :)
      </p>

      <div class="divider" aria-hidden="true"></div>

      <nav aria-label="Main links">
        <a
          class="link"
          href="https://open.spotify.com/artist/2zrZaCJ7VeKonkoDa8oES1"
          target="_blank"
          rel="noopener noreferrer"
        >
          farewell 42
          <span class="arrow" aria-hidden="true">↗</span>
        </a>

        <a class="link" href="/diary">
          diary
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
```
