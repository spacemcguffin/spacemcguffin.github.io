<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#05070d"
  >

  <title>lewis.lc</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Geist+Pixel&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --background-top: #0b1020;
      --background-middle: #070b14;
      --background-bottom: #03050a;

      --nebula-one: rgba(66, 89, 164, 0.15);
      --nebula-two: rgba(98, 65, 147, 0.1);
      --nebula-three: rgba(38, 105, 128, 0.08);

      --text-primary: rgba(255, 255, 255, 0.96);
      --text-secondary: rgba(255, 255, 255, 0.57);
      --text-muted: rgba(255, 255, 255, 0.34);

      --cursor-x: 50vw;
      --cursor-y: 50vh;
      --cursor-opacity: 0;
    }

    body.time-morning {
      --background-top: #17141e;
      --background-middle: #0f0e16;
      --background-bottom: #08090d;

      --nebula-one: rgba(176, 119, 103, 0.11);
      --nebula-two: rgba(112, 91, 145, 0.1);
      --nebula-three: rgba(184, 141, 93, 0.055);
    }

    body.time-day {
      --background-top: #101724;
      --background-middle: #0a101a;
      --background-bottom: #06090f;

      --nebula-one: rgba(77, 112, 158, 0.12);
      --nebula-two: rgba(85, 88, 145, 0.09);
      --nebula-three: rgba(52, 121, 139, 0.065);
    }

    body.time-evening {
      --background-top: #151329;
      --background-middle: #0d0c1b;
      --background-bottom: #06070e;

      --nebula-one: rgba(111, 77, 161, 0.13);
      --nebula-two: rgba(77, 91, 158, 0.1);
      --nebula-three: rgba(166, 91, 111, 0.06);
    }

    body.time-night {
      --background-top: #0b1020;
      --background-middle: #070b14;
      --background-bottom: #03050a;

      --nebula-one: rgba(66, 89, 164, 0.15);
      --nebula-two: rgba(98, 65, 147, 0.1);
      --nebula-three: rgba(38, 105, 128, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--background-bottom);
    }

    body {
      position: relative;
      min-height: 100svh;
      margin: 0;
      overflow: hidden;

      color: var(--text-primary);

      background:
        linear-gradient(
          155deg,
          var(--background-top) 0%,
          var(--background-middle) 50%,
          var(--background-bottom) 100%
        );

      font-family:
        "Google Sans Flex",
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      transition: background 1.5s ease;
      isolation: isolate;
    }

    .ambient-background {
      position: fixed;
      inset: 0;
      z-index: -5;
      overflow: hidden;
      pointer-events: none;
    }

    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      opacity: 0.88;
      will-change: transform;
    }

    .nebula-one {
      top: -32%;
      left: -18%;
      width: min(75vw, 920px);
      aspect-ratio: 1;
      background: var(--nebula-one);
      animation: drift-one 34s ease-in-out infinite alternate;
    }

    .nebula-two {
      right: -28%;
      bottom: -38%;
      width: min(82vw, 980px);
      aspect-ratio: 1;
      background: var(--nebula-two);
      animation: drift-two 42s ease-in-out infinite alternate;
    }

    .nebula-three {
      top: 34%;
      left: 48%;
      width: min(48vw, 620px);
      aspect-ratio: 1;
      background: var(--nebula-three);
      animation: drift-three 38s ease-in-out infinite alternate;
    }

    @keyframes drift-one {
      from {
        transform: translate3d(-2%, -2%, 0) scale(1);
      }

      to {
        transform: translate3d(8%, 6%, 0) scale(1.09);
      }
    }

    @keyframes drift-two {
      from {
        transform: translate3d(3%, 2%, 0) scale(1.02);
      }

      to {
        transform: translate3d(-7%, -5%, 0) scale(1.11);
      }
    }

    @keyframes drift-three {
      from {
        transform: translate3d(-4%, 3%, 0) scale(0.96);
      }

      to {
        transform: translate3d(5%, -5%, 0) scale(1.08);
      }
    }

    .stars,
    .stars::before,
    .stars::after {
      position: absolute;
      inset: -20%;
      content: "";
      pointer-events: none;
    }

    .stars {
      opacity: 0.48;

      background-image:
        radial-gradient(
          circle,
          rgba(255, 255, 255, 0.65) 0 0.7px,
          transparent 0.9px
        ),
        radial-gradient(
          circle,
          rgba(196, 215, 255, 0.42) 0 0.65px,
          transparent 0.9px
        );

      background-position:
        0 0,
        37px 61px;

      background-size:
        108px 108px,
        157px 157px;

      animation: star-drift 62s linear infinite;
    }

    .stars::before {
      opacity: 0.42;

      background-image:
        radial-gradient(
          circle,
          rgba(255, 255, 255, 0.72) 0 1px,
          transparent 1.2px
        );

      background-position: 31px 17px;
      background-size: 229px 229px;

      animation: star-drift-reverse 84s linear infinite;
    }

    .stars::after {
      opacity: 0.2;

      background-image:
        radial-gradient(
          circle,
          rgba(173, 200, 255, 0.88) 0 1.2px,
          transparent 1.4px
        );

      background-position: 90px 44px;
      background-size: 341px 341px;

      animation: star-pulse 9s ease-in-out infinite alternate;
    }

    @keyframes star-drift {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(-42px, 32px, 0);
      }
    }

    @keyframes star-drift-reverse {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(35px, -28px, 0);
      }
    }

    @keyframes star-pulse {
      from {
        opacity: 0.13;
      }

      to {
        opacity: 0.28;
      }
    }

    .cursor-light {
      position: fixed;
      z-index: -3;
      top: 0;
      left: 0;

      width: 720px;
      height: 720px;

      border-radius: 50%;
      pointer-events: none;

      background:
        radial-gradient(
          circle,
          rgba(142, 163, 255, 0.095) 0%,
          rgba(105, 121, 210, 0.037) 30%,
          transparent 70%
        );

      opacity: var(--cursor-opacity);

      transform:
        translate(
          calc(var(--cursor-x) - 50%),
          calc(var(--cursor-y) - 50%)
        );

      transition: opacity 450ms ease;
      will-change: transform;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: 0.024;

      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='.55'/%3E%3C/svg%3E");
    }

    .page {
      display: grid;
      place-items: center;
      min-height: 100svh;
      padding: 32px;
    }

    .container {
      width: min(100%, 720px);
      text-align: center;

      animation:
        page-arrive 950ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes page-arrive {
      from {
        opacity: 0;
        transform: translateY(16px);
        filter: blur(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    h1,
    h2,
    h3 {
      margin: 0;
    }

    h1 {
      font-size: clamp(4rem, 13vw, 8.5rem);
      font-weight: 680;
      line-height: 0.86;
      letter-spacing: -0.085em;

      text-shadow:
        0 3px 34px rgba(255, 255, 255, 0.055);
    }

    .subtitle {
      margin: 28px 0 0;

      color: var(--text-secondary);

      font-size: clamp(1rem, 2.6vw, 1.22rem);
      font-weight: 420;
      line-height: 1.45;
      letter-spacing: -0.018em;
    }

    .divider {
      width: 42px;
      height: 1px;
      margin: 34px auto;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
    }

    .links {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px 28px;
    }

    .link {
      position: relative;
      display: inline-flex;
      align-items: center;

      color: rgba(255, 255, 255, 0.72);

      font-size: 0.98rem;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.01em;
      text-decoration: none;

      transition:
        color 180ms ease,
        transform 180ms ease;
    }

    .link::after {
      position: absolute;
      right: 0;
      bottom: -8px;
      left: 0;

      height: 1px;
      content: "";

      background: currentColor;

      transform: scaleX(0);
      transform-origin: center;

      transition: transform 220ms ease;
    }

    .link:hover {
      color: #ffffff;
      transform: translateY(-2px);
    }

    .link:hover::after {
      transform: scaleX(1);
    }

    .link:active {
      transform: translateY(0);
    }

    .link:focus-visible {
      outline: 2px solid rgba(190, 206, 255, 0.72);
      outline-offset: 7px;
      border-radius: 3px;
    }

    .spotify-link {
      font-family:
        "Geist Pixel",
        "Google Sans Flex",
        sans-serif;

      letter-spacing: 0.02em;
    }

    .link-separator {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    @media (max-width: 600px) {
      .page {
        padding: 24px;
      }

      h1 {
        font-size: clamp(3.7rem, 20vw, 6rem);
      }

      .subtitle {
        margin-top: 23px;
      }

      .divider {
        margin: 29px auto;
      }

      .links {
        gap: 20px;
        flex-direction: column;
      }

      .link-separator {
        display: none;
      }

      .nebula {
        filter: blur(80px);
      }
    }

    @media (hover: none), (pointer: coarse) {
      .cursor-light {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .cursor-light {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="ambient-background" aria-hidden="true">
    <div class="nebula nebula-one"></div>
    <div class="nebula nebula-two"></div>
    <div class="nebula nebula-three"></div>
    <div class="stars"></div>
  </div>

  <div class="cursor-light" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="page">
    <section class="container">
      <h1>lewis.lc</h1>

      <p class="subtitle">
        deleted all my social media :)
      </p>

      <div class="divider" aria-hidden="true"></div>

      <nav class="links" aria-label="Main links">
        <a
          class="link spotify-link"
          href="https://open.spotify.com/artist/2zrZaCJ7VeKonkoDa8oES1"
          target="_blank"
          rel="noopener noreferrer"
        >
          farewell 42
        </a>

        <span class="link-separator" aria-hidden="true"></span>

        <a class="link" href="/diary">
          diary
        </a>
      </nav>
    </section>
  </main>

  <script>
    (() => {
      const body = document.body;
      const root = document.documentElement;
      const cursorLight = document.querySelector(".cursor-light");

      function applyTimeTheme() {
        const hour = new Date().getHours();

        body.classList.remove(
          "time-morning",
          "time-day",
          "time-evening",
          "time-night"
        );

        if (hour >= 5 && hour < 11) {
          body.classList.add("time-morning");
        } else if (hour >= 11 && hour < 17) {
          body.classList.add("time-day");
        } else if (hour >= 17 && hour < 21) {
          body.classList.add("time-evening");
        } else {
          body.classList.add("time-night");
        }
      }

      applyTimeTheme();

      window.setInterval(applyTimeTheme, 10 * 60 * 1000);

      const supportsCursor =
        window.matchMedia("(hover: hover) and (pointer: fine)").matches;

      if (supportsCursor && cursorLight) {
        let targetX = window.innerWidth / 2;
        let targetY = window.innerHeight / 2;

        let currentX = targetX;
        let currentY = targetY;

        function animateCursorLight() {
          currentX += (targetX - currentX) * 0.085;
          currentY += (targetY - currentY) * 0.085;

          root.style.setProperty("--cursor-x", `${currentX}px`);
          root.style.setProperty("--cursor-y", `${currentY}px`);

          requestAnimationFrame(animateCursorLight);
        }

        window.addEventListener(
          "pointermove",
          (event) => {
            targetX = event.clientX;
            targetY = event.clientY;

            root.style.setProperty("--cursor-opacity", "1");
          },
          { passive: true }
        );

        document.documentElement.addEventListener("mouseleave", () => {
          root.style.setProperty("--cursor-opacity", "0");
        });

        document.documentElement.addEventListener("mouseenter", () => {
          root.style.setProperty("--cursor-opacity", "1");
        });

        requestAnimationFrame(animateCursorLight);
      }
    })();
  </script>
</body>
</html>
