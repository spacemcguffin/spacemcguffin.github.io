<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="The personal website of Lewis."
  >

  <meta name="theme-color" content="#03020b">

  <title>lewis.lc</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Google+Sans+Flex:opsz,wght@6..144,300..700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --background: #03020b;
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(241, 224, 255, 0.76);

      --pink: #ff32d2;
      --purple: #a855f7;
      --blue: #4ba3ff;
      --cyan: #55d8ff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--background);
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;

      color: var(--text);
      font-family: "Google Sans Flex", sans-serif;

      background:
        radial-gradient(
          circle at 18% 20%,
          rgba(168, 85, 247, 0.13),
          transparent 35rem
        ),
        radial-gradient(
          circle at 82% 78%,
          rgba(255, 50, 210, 0.09),
          transparent 32rem
        ),
        var(--background);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;

      opacity: 0.12;

      background-image:
        radial-gradient(
          circle,
          rgba(255, 255, 255, 0.7) 0 1px,
          transparent 1.25px
        );

      background-size: 46px 46px;

      -webkit-mask-image:
        linear-gradient(
          to bottom,
          black,
          transparent 85%
        );

      mask-image:
        linear-gradient(
          to bottom,
          black,
          transparent 85%
        );
    }

    .container {
      min-height: 100vh;
      width: min(100%, 70rem);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;

      margin: 0 auto;
      padding: 3rem clamp(1.5rem, 6vw, 5rem);

      animation:
        page-enter 800ms
        cubic-bezier(0.22, 1, 0.36, 1)
        both;
    }

    h1,
    h2,
    h3 {
      margin: 0;
    }

    h1 {
      max-width: 100%;

      font-size: clamp(4.5rem, 15vw, 11rem);
      font-weight: 620;
      line-height: 0.85;
      letter-spacing: -0.075em;

      text-wrap: balance;
    }

    .status {
      margin: 1.6rem 0 2.8rem;

      color: var(--muted);

      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 400;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.2rem;
    }

    .home-link {
      position: relative;

      display: inline-flex;
      align-items: center;
      gap: 0.45em;

      color: inherit;
      text-decoration: none;

      transition:
        color 180ms ease,
        transform 180ms ease,
        text-shadow 180ms ease;
    }

    .home-link::after {
      content: "";

      position: absolute;
      left: 0;
      bottom: -0.18em;

      width: 100%;
      height: 2px;

      border-radius: 999px;

      background:
        linear-gradient(
          90deg,
          var(--purple),
          var(--pink),
          var(--cyan)
        );

      transform: scaleX(0);
      transform-origin: right;

      transition:
        transform 260ms
        cubic-bezier(0.22, 1, 0.36, 1);
    }

    .home-link:hover,
    .home-link:focus-visible {
      color: #ffffff;

      transform: translateY(-2px);

      text-shadow:
        0 0 20px rgba(168, 85, 247, 0.22);
    }

    .home-link:hover::after,
    .home-link:focus-visible::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    .arrow {
      display: inline-block;

      opacity: 0.5;

      transition:
        transform 180ms ease,
        opacity 180ms ease;
    }

    .home-link:hover .arrow,
    .home-link:focus-visible .arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    .home-link:focus-visible {
      outline: 2px solid rgba(168, 85, 247, 0.8);
      outline-offset: 8px;
      border-radius: 3px;
    }

    .music-heading {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 500;
    }

    .music-link {
      color: rgba(255, 173, 237, 0.96);

      font-family:
        "Geist Pixel",
        monospace;

      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .diary-heading {
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      font-weight: 500;
    }

    .diary-link {
      color: rgba(255, 255, 255, 0.9);
    }

    @keyframes page-enter {
      from {
        opacity: 0;
        transform: translateY(1.2rem);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .container {
        padding:
          2rem
          1.4rem;
      }

      h1 {
        font-size: clamp(4rem, 22vw, 6.5rem);
      }

      .status {
        margin-top: 1.3rem;
        margin-bottom: 2.4rem;
      }

      .links {
        gap: 1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>lewis.lc</h1>

    <p class="status">
      deleted all my social media :)
    </p>

    <nav class="links" aria-label="Main links">
      <h2 class="music-heading">
        <a
          class="home-link music-link"
          href="https://open.spotify.com/artist/2zrZaCJ7VeKonkoDa8oES1"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span>farewell 42</span>
          <span class="arrow" aria-hidden="true">↗</span>
        </a>
      </h2>

      <h3 class="diary-heading">
        <a
          class="home-link diary-link"
          href="/diary"
        >
          <span>diary</span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </h3>
    </nav>
  </main>
</body>
</html>
