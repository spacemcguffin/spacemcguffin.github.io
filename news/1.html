<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07101f">
  <title>2026 Diary — Lewis Christian</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050b15;
      --bg-soft: #091322;
      --panel: rgba(8, 16, 31, .82);
      --panel-solid: #0a1425;
      --line: rgba(187, 203, 235, .14);
      --line-strong: rgba(196, 175, 255, .30);
      --text: #f4f0ea;
      --muted: #a9b1c3;
      --serif-muted: #c9c1d7;
      --purple: #b87cff;
      --purple-soft: rgba(184, 124, 255, .14);
      --green: #68d6b1;
      --danger: #f07b9a;
      --sidebar: 244px;
      --radius: 18px;
      --shadow: 0 24px 70px rgba(0,0,0,.32);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 92% 10%, rgba(135, 76, 221, .18), transparent 28rem),
        radial-gradient(circle at 72% 105%, rgba(37, 114, 197, .10), transparent 30rem),
        linear-gradient(135deg, #050a13 0%, #07101d 55%, #050a13 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .65;
      background-image:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,.75) 0 1px, transparent 1.5px),
        radial-gradient(circle at 86% 25%, rgba(255,255,255,.45) 0 1px, transparent 1.5px),
        radial-gradient(circle at 70% 70%, rgba(196,166,255,.5) 0 1px, transparent 1.5px),
        radial-gradient(circle at 35% 85%, rgba(255,255,255,.35) 0 1px, transparent 1.5px);
      background-size: 180px 180px, 260px 260px, 340px 340px, 220px 220px;
    }

    button, input, select { font: inherit; }
    button { color: inherit; }
    a { color: inherit; text-decoration: none; }

    .shell { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar) minmax(0, 1fr); }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: var(--sidebar);
      padding: 32px 24px 24px;
      border-right: 1px solid var(--line);
      background: rgba(5, 12, 24, .86);
      backdrop-filter: blur(18px);
      z-index: 30;
      overflow-y: auto;
    }

    .brand {
      display: inline-block;
      margin-bottom: 40px;
      font-family: "Instrument Serif", serif;
      font-size: 43px;
      line-height: .9;
      letter-spacing: -.035em;
    }

    .side-label {
      margin: 26px 10px 11px;
      color: var(--purple);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .side-nav { display: grid; gap: 5px; }
    .side-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 44px;
      padding: 0 13px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: #cbd2df;
      text-align: left;
      cursor: pointer;
      transition: .2s ease;
    }
    .side-btn:hover, .side-btn.active { background: var(--purple-soft); color: #eee7ff; }
    .side-icon { width: 20px; text-align: center; color: #bca2f3; }

    .month-dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; background: var(--dot, var(--purple)); box-shadow: 0 0 14px color-mix(in srgb, var(--dot, var(--purple)) 55%, transparent); }
    .side-rule { height: 1px; margin: 22px 8px; background: var(--line); }
    .sidebar-bottom { margin-top: 25px; }

    main { grid-column: 2; padding: 28px clamp(24px, 4vw, 70px) 80px; position: relative; z-index: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 48px;
    }

    .eyebrow { display: flex; align-items: center; gap: 12px; font-family: "Instrument Serif", serif; font-size: 23px; }
    .spark { color: var(--purple); font-family: serif; }
    .top-actions { display: flex; gap: 12px; }

    .select-wrap, .search-wrap {
      height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: rgba(7, 14, 27, .62);
    }
    .select-wrap select {
      width: 120px; height: 100%; padding: 0 15px; color: var(--text); border: 0; outline: 0; background: transparent; cursor: pointer;
    }
    .search-wrap { position: relative; width: min(280px, 30vw); }
    .search-wrap input { width: 100%; height: 100%; padding: 0 42px 0 16px; color: var(--text); border: 0; outline: 0; background: transparent; }
    .search-wrap input::placeholder { color: #788196; }
    .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #9ca5b8; }

    .hero-grid { display: block; }
    .hero-copy h1 {
      margin: 0;
      font-family: "Instrument Serif", serif;
      font-size: clamp(78px, 9vw, 136px);
      font-weight: 400;
      line-height: .78;
      letter-spacing: -.045em;
    }
    .hero-line { width: 66px; height: 1px; margin: 28px 0 24px; background: linear-gradient(90deg, var(--purple), transparent); }
    .hero-copy p { max-width: 550px; margin: 0; color: var(--muted); font-size: 16px; line-height: 1.7; }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      max-width: 760px;
      margin-top: 34px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--line);
      box-shadow: var(--shadow);
    }
    .stat-item { padding: 16px 18px; background: rgba(7, 15, 29, .88); }
    .stat-item span { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
    .stat-item strong { display: block; margin-top: 6px; font-family: "Instrument Serif", serif; font-size: 27px; font-weight: 400; }

    .content-grid { margin-top: 42px; }
    .entries-head, .entry-row { display: grid; grid-template-columns: 58px minmax(220px, 1fr) 150px 100px; gap: 14px; align-items: center; }
    .entries-head { min-height: 42px; padding: 0 0 10px; color: #b47be8; border-bottom: 1px solid var(--line-strong); font-family: "Instrument Serif", serif; font-size: 16px; letter-spacing: .04em; }
    .entry-row { min-height: 57px; border-bottom: 1px solid rgba(187, 203, 235, .10); cursor: pointer; transition: .2s ease; }
    .entry-row:hover { padding-left: 7px; background: linear-gradient(90deg, rgba(184,124,255,.075), transparent); }
    .entry-num, .entry-date { color: #d1d5df; font-size: 13px; }
    .entry-title { font-family: "Instrument Serif", serif; font-size: 25px; letter-spacing: -.015em; }
    .entry-row.removed-row .entry-title {
      color: #8f8998;
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      text-decoration-color: rgba(240, 123, 154, .72);
    }
    .entry-row.removed-row .entry-title::after {
      content: "removed";
      display: inline-block;
      margin-left: 10px;
      color: #f0a1b6;
      font-family: Inter, system-ui, sans-serif;
      font-size: 9px;
      font-style: normal;
      font-weight: 600;
      letter-spacing: .09em;
      text-decoration: none;
      text-transform: uppercase;
      vertical-align: middle;
      opacity: .78;
    }
    .entry-status { display: inline-flex; justify-content: center; width: fit-content; padding: 6px 9px; border-radius: 7px; color: var(--green); background: rgba(35, 142, 115, .17); font-size: 11px; }
    .entry-status.removed { color: #f5a5b9; background: rgba(202, 67, 104, .14); }

    .month-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin: 26px 0 11px;
      padding: 0 10px;
      border: 0;
      background: transparent;
      color: var(--purple);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .11em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .month-toggle-icon { transition: transform .22s ease; }
    .month-section.collapsed .month-toggle-icon { transform: rotate(-90deg); }
    .month-list { display: grid; gap: 5px; max-height: 620px; overflow: hidden; transition: max-height .32s ease, opacity .22s ease; }
    .month-section.collapsed .month-list { max-height: 0; opacity: 0; }

    .empty { display: none; padding: 60px 20px; color: var(--muted); text-align: center; font-family: "Instrument Serif", serif; font-size: 28px; }
    .footer-note { margin: 28px 0 0; color: #737b8c; text-align: center; font-family: "Instrument Serif", serif; font-size: 18px; font-style: italic; }

    .mobile-menu { display: none; width: 44px; height: 44px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); cursor: pointer; }
    .mobile-overlay { display: none; }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 120;
      width: min(390px, calc(100vw - 32px));
      padding: 16px 18px;
      border: 1px solid rgba(205, 186, 255, .28);
      border-radius: 15px;
      background: rgba(8, 18, 33, .96);
      box-shadow: 0 22px 60px rgba(0,0,0,.48);
      backdrop-filter: blur(16px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(18px);
      transition: opacity .22s ease, transform .22s ease, visibility .22s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; visibility: visible; transform: none; }
    .toast-title { display: block; margin-bottom: 4px; font-family: "Instrument Serif", serif; font-size: 23px; font-weight: 400; }
    .toast-message { color: var(--muted); font-size: 13px; line-height: 1.55; }

    @media (max-width: 1180px) {
      .stats-strip { max-width: 100%; }
    }

    @media (max-width: 900px) {
      :root { --sidebar: 280px; }
      .shell { display: block; }
      main { padding: 20px 20px 70px; }
      .sidebar { transform: translateX(-102%); transition: .28s ease; box-shadow: 20px 0 60px rgba(0,0,0,.4); }
      body.menu-open .sidebar { transform: none; }
      .mobile-overlay { position: fixed; inset: 0; z-index: 25; display: block; opacity: 0; visibility: hidden; background: rgba(0,0,0,.55); transition: .25s; }
      body.menu-open .mobile-overlay { opacity: 1; visibility: visible; }
      .mobile-menu { display: block; }
      .topbar { margin-bottom: 42px; }
      .eyebrow { display: none; }
      .top-actions { flex: 1; }
      .search-wrap { width: 100%; }
      .entries-head { display: none; }
      .entry-row { grid-template-columns: 40px minmax(0,1fr) auto; gap: 12px; padding: 13px 0; }
      .entry-date, .entry-status { display: none; }
      .entry-title { font-size: 23px; }
      .stats-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      main { padding-inline: 16px; }
      .top-actions .select-wrap { display: none; }
      .hero-copy h1 { font-size: 76px; }
      .stats-strip { grid-template-columns: 1fr 1fr; }
      .stat-item { padding: 14px; }
      .content-grid { margin-top: 30px; }
      .toast { right: 16px; bottom: 16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <a class="brand" href="#top">lewis.lc</a>

      <section class="month-section" id="monthSection">
        <button class="month-toggle" id="monthToggle" aria-expanded="true" aria-controls="monthNav">
          <span>Browse by month</span><span class="month-toggle-icon">⌄</span>
        </button>
        <nav class="side-nav month-list" id="monthNav"></nav>
      </section>

      <div class="side-rule"></div>
      <div class="sidebar-bottom">
        <button class="side-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span class="side-icon">↑</span>Back to top</button>
      </div>
    </aside>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <main id="top">
      <header class="topbar">
        <button class="mobile-menu" id="mobileMenu" aria-label="Open menu">☰</button>
        <div class="eyebrow"><span class="spark">✦</span> a year in diary entries</div>
        <div class="top-actions">
          <div class="select-wrap">
            <select aria-label="Choose year" onchange="location.href=this.value">
              <option value="#" selected>2026</option>
              <option value="/diary/2025">2025</option>
              <option value="/diary/2027">2027</option>
            </select>
          </div>
          <label class="search-wrap">
            <input id="searchInput" type="search" placeholder="Search entries…" autocomplete="off">
            <span class="search-icon">⌕</span>
          </label>
        </div>
      </header>

      <section class="hero-grid">
        <div class="hero-copy">
          <h1>2026 diary</h1>
          <div class="hero-line"></div>
          <p>A collection of thoughts, moments and memories from throughout the year — written by Lewis Christian.</p>
          <div class="stats-strip" aria-label="2026 diary statistics">
            <div class="stat-item"><span>entries listed</span><strong id="entryCount">0</strong></div>
            <div class="stat-item"><span>published</span><strong id="publishedCount">0</strong></div>
            <div class="stat-item"><span>removed</span><strong id="removedCount">0</strong></div>
          </div>
        </div>
      </section>

      <section class="content-grid">
        <div class="entries-panel">
          <div class="entries-head">
            <span>#</span><span>entry title</span><span>month</span><span>status</span>
          </div>
          <div id="entriesList"></div>
          <div class="empty" id="emptyState">no entries found</div>
          <p class="footer-note">Every entry is a moment in time, captured forever. ✦</p>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="archiveToast" role="status" aria-live="polite" aria-atomic="true">
    <strong class="toast-title" id="toastTitle"></strong>
    <div class="toast-message" id="toastMessage"></div>
  </div>

  <script>
    const monthColours = {
      January:'#ec5b9b', February:'#ff9565', March:'#d7bd6c', April:'#55c8ae', May:'#42b6c8', June:'#62aee8', July:'#9e82f7'
    };

    const rawEntries = {
      January: [
        ['everything changes in the end',1], ['the light of day',1], ['chilled out',1], ['trying to change',1],
        ["i’ve been playing pretend",1], ['dead names',1], ['a walk in the park',1]
      ],
      February: [['farewell 42',1], ['hello 33',1], ["pandora’s box",1], ['triggers',1], ['A&E',1]],
      March: [
        ['never mind the paradox',1], ['memes and nukes',1], ['wobbly sets',1], ['lewis & charlotte',1], ['devvo returns',1],
        ['thanks for the memories',1], ['hartnell found',1], ['day of the daleks',1], ['mullet and the myrka',1],
        ['waiting for bill',1], ['back to hogwarts',1], ['all the things she said',0]
      ],
      April: [
        ['complicated feelings',0], ['the nightmare begins',1], ['fever dream',1], ['out of my mind',0], ['NSFW',0],
        ['nine years lost',1], ['affairs in order',1], ['into the wilderness',1], ['familiar faces',0], ['riding the waves',0],
        ['a little bit of kim',0], ['lucky dip',1], ['you deserve the world',0], ['child at heart',1], ['hazy memories',1],
        ['a thorn between two roses',0], ['the moon and her magic',0], ['lovely stuff ^_^',0], ['guardian angels',0],
        ['closing chapter',0], ['you and me',0]
      ],
      May: [
        ['33% complete',0], ['secret santa',0], ['going in deep',0], ['fatherhood',0], ['about last night',0], ['cat with the cream',0],
        ['playing with fire',0], ['first kiss',0], ['vulnerability',0], ['moments of joy',0], ['sexy vanilla',0], ['breathless',0],
        ['take me back',0], ['late to the party',0], ['soul and steel',1], ['intoxication',0], ['temporal orbit',0], ['rest, in pieces',0]
      ],
      June: [
        ['waiting time',1], ['in her arms',0], ['chavs and goths',1], ['no fucks given',0], ['doctor who is dead',1],
        ['inferno unbound',1], ['and then there were none',1], ['solstice',1], ['teenage rebel',1], ['zoe, amy and gem',1], ['hotness prevails',1]
      ],
      July: [['slow and steady',1], ['preservation',1], ['ghosts of time',1], ['rhythm and blues',1], ['every single day',1]]
    };

    const entries = [];
    let counter = 1;
    Object.entries(rawEntries).forEach(([month, list]) => {
      list.forEach(([title, published], monthIndex) => {
        entries.push({
          id: counter++, title, month, published: Boolean(published),
          displayNumber: String(counter - 1).padStart(3,'0')
        });
      });
    });

    const entriesList = document.getElementById('entriesList');
    const searchInput = document.getElementById('searchInput');
    const emptyState = document.getElementById('emptyState');
    const monthNav = document.getElementById('monthNav');
    let activeMonth = 'all';
    let visibleEntries = [...entries];
    let toastTimer;

    function buildMonthNav() {
      Object.keys(rawEntries).forEach(month => {
        const button = document.createElement('button');
        button.className = 'side-btn';
        button.dataset.filter = month;
        button.innerHTML = `<span class="month-dot" style="--dot:${monthColours[month]}"></span>${month}`;
        monthNav.appendChild(button);
      });
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      visibleEntries = entries.filter(entry =>
        (activeMonth === 'all' || entry.month === activeMonth) &&
        entry.title.toLowerCase().includes(query)
      );

      entriesList.innerHTML = visibleEntries.map((entry, index) => `
        <article class="entry-row ${entry.published ? '' : 'removed-row'}" data-index="${index}" tabindex="0" aria-label="View archive information for ${entry.title}">
          <span class="entry-num">${entry.displayNumber}</span>
          <span class="entry-title">${escapeHtml(entry.title)}</span>
          <span class="entry-date">${entry.month} 2026</span>
          <span class="entry-status ${entry.published ? '' : 'removed'}">${entry.published ? 'published' : 'removed'}</span>
        </article>`).join('');

      emptyState.style.display = visibleEntries.length ? 'none' : 'block';
      document.getElementById('entryCount').textContent = entries.length;
      document.getElementById('publishedCount').textContent = entries.filter(e => e.published).length;
      document.getElementById('removedCount').textContent = entries.filter(e => !e.published).length;
    }

    function escapeHtml(value) {
      return value.replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }

    document.addEventListener('click', event => {
      const filterButton = event.target.closest('[data-filter]');
      if (filterButton) {
        activeMonth = filterButton.dataset.filter;
        document.querySelectorAll('[data-filter]').forEach(btn => btn.classList.toggle('active', btn === filterButton));
        render();
        document.body.classList.remove('menu-open');
      }

      const row = event.target.closest('.entry-row');
      if (row) showArchiveToast(visibleEntries[Number(row.dataset.index)]);
    });

    document.addEventListener('keydown', event => {
      if (event.target.closest('.entry-row') && (event.key === 'Enter' || event.key === ' ')) {
        event.preventDefault();
        showArchiveToast(visibleEntries[Number(event.target.closest('.entry-row').dataset.index)]);
      }
    });

    searchInput.addEventListener('input', render);

    const toast = document.getElementById('archiveToast');
    function showArchiveToast(entry) {
      if (!entry) return;
      document.getElementById('toastTitle').textContent = entry.title;
      document.getElementById('toastMessage').textContent = entry.published
        ? 'This diary entry is not available to read. Only its title has been archived.'
        : 'This entry has been removed. Its title remains in the archive.';
      toast.classList.remove('show');
      void toast.offsetWidth;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 4200);
    }


    document.getElementById('mobileMenu').addEventListener('click', () => document.body.classList.add('menu-open'));
    document.getElementById('mobileOverlay').addEventListener('click', () => document.body.classList.remove('menu-open'));

    const monthSection = document.getElementById('monthSection');
    const monthToggle = document.getElementById('monthToggle');
    monthToggle.addEventListener('click', () => {
      const collapsed = monthSection.classList.toggle('collapsed');
      monthToggle.setAttribute('aria-expanded', String(!collapsed));
    });

    buildMonthNav();
    render();
  </script>
</body>
</html>
