<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07101f">
  <title>2008 Diary — Lewis Christian</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050b15;
      --bg-soft: #091322;
      --panel: rgba(8, 16, 31, .82);
      --panel-solid: #0a1425;
      --line: rgba(187, 203, 235, .14);
      --line-strong: rgba(112, 169, 255, .30);
      --text: #f4f0ea;
      --muted: #a9b1c3;
      --serif-muted: #c9c1d7;
      --purple: #69a9ff;
      --purple-soft: rgba(73, 145, 255, .14);
      --green: #68d6b1;
      --danger: #f07b9a;
      --radius: 18px;
      --shadow: 0 24px 70px rgba(0,0,0,.32);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 92% 10%, rgba(38, 114, 219, .18), transparent 28rem),
        radial-gradient(circle at 72% 105%, rgba(37, 114, 197, .10), transparent 30rem),
        linear-gradient(135deg, #050a13 0%, #07101d 55%, #050a13 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .65;
      background-image:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,.75) 0 1px, transparent 1.5px),
        radial-gradient(circle at 86% 25%, rgba(255,255,255,.45) 0 1px, transparent 1.5px),
        radial-gradient(circle at 70% 70%, rgba(112,169,255,.5) 0 1px, transparent 1.5px),
        radial-gradient(circle at 35% 85%, rgba(255,255,255,.35) 0 1px, transparent 1.5px);
      background-size: 180px 180px, 260px 260px, 340px 340px, 220px 220px;
    }

    button, input, select { font: inherit; }
    button { color: inherit; }
    a { color: inherit; text-decoration: none; }

    .shell { min-height: 100vh; transition: padding-right .42s cubic-bezier(.22,.8,.24,1); }
    body.panel-open .shell { padding-right: 430px; }

    main { width: 100%; padding: 32px clamp(28px, 5vw, 88px) 90px; position: relative; z-index: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 48px;
    }

    .eyebrow { display: flex; align-items: center; gap: 12px; font-family: "Instrument Serif", serif; font-size: 23px; }
    .spark { color: var(--purple); font-family: serif; }
    .top-actions { display: flex; gap: 12px; }

    .select-wrap, .search-wrap {
      height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      background: rgba(7, 14, 27, .62);
    }
    .select-wrap select {
      width: 120px; height: 100%; padding: 0 15px; color: var(--text); border: 0; outline: 0; background: transparent; cursor: pointer;
    }
    .search-wrap { position: relative; width: min(280px, 30vw); }
    .search-wrap input { width: 100%; height: 100%; padding: 0 42px 0 16px; color: var(--text); border: 0; outline: 0; background: transparent; }
    .search-wrap input::placeholder { color: #788196; }
    .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #9ca5b8; }

    .hero-grid { display: block; }
    .hero-copy h1 {
      margin: 0;
      font-family: "Instrument Serif", serif;
      font-size: clamp(78px, 9vw, 136px);
      font-weight: 400;
      line-height: .78;
      letter-spacing: -.045em;
    }
    .hero-line { width: 66px; height: 1px; margin: 28px 0 24px; background: linear-gradient(90deg, var(--purple), transparent); }
    .hero-copy p { max-width: 550px; margin: 0; color: var(--muted); font-size: 16px; line-height: 1.7; }

    .content-grid { margin-top: 32px; }
    .entries-panel { width: 100%; padding: 0 18px; }
    .entries-head, .entry-row { display: grid; grid-template-columns: 76px minmax(320px, 1fr) 190px 120px; gap: 22px; align-items: center; }
    .entries-head { min-height: 54px; padding: 0 14px 14px; color: #7db6ff; border-bottom: 1px solid var(--line-strong); font-family: "Instrument Serif", serif; font-size: 20px; letter-spacing: .025em; }
    .entry-row { min-height: 84px; padding: 8px 14px; border-bottom: 1px solid rgba(187, 203, 235, .11); cursor: pointer; transition: padding .22s ease, background .22s ease, border-color .22s ease; }

    .month-divider {
      display: grid;
      grid-template-columns: 76px minmax(320px, 1fr) 190px 120px;
      gap: 22px;
      align-items: end;
      min-height: 82px;
      padding: 30px 14px 12px;
      border-bottom: 1px solid var(--line-strong);
      color: var(--purple);
    }

    .month-divider:first-child {
      min-height: 66px;
      padding-top: 14px;
    }

    .month-divider-name {
      grid-column: 1 / -1;
      font-family: "Instrument Serif", serif;
      font-size: clamp(29px, 2.3vw, 40px);
      line-height: 1;
      letter-spacing: -.02em;
      text-transform: lowercase;
    }

    .entry-row:hover { padding-left: 24px; background: linear-gradient(90deg, rgba(73,145,255,.095), rgba(73,145,255,.02) 55%, transparent); border-color: rgba(112,169,255,.22); }
    .entry-num, .entry-date { color: #c9ced9; font-size: 15px; }
    .entry-title { font-family: "Instrument Serif", serif; font-size: clamp(30px, 2.6vw, 43px); line-height: 1.02; letter-spacing: -.025em; }
    .entry-row.removed-row .entry-title {
      position: relative;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      color: #8f8998;
    }
    .entry-row.removed-row .entry-title::after {
      content: "";
      position: absolute;
      left: -2%;
      top: 50%;
      width: 104%;
      height: 1.5px;
      border-radius: 999px;
      background: rgba(240, 123, 154, .72);
      box-shadow: 0 0 6px rgba(240, 123, 154, .18);
      transform: translateY(-50%) rotate(-7deg);
      transform-origin: center;
      pointer-events: none;
    }
    .entry-status { display: inline-flex; justify-content: center; width: fit-content; padding: 6px 9px; border-radius: 7px; color: var(--green); background: rgba(35, 142, 115, .17); font-size: 11px; }
    .entry-status.removed { color: #f5a5b9; background: rgba(202, 67, 104, .14); }

    .empty { display: none; padding: 60px 20px; color: var(--muted); text-align: center; font-family: "Instrument Serif", serif; font-size: 28px; }
    .footer-note { margin: 28px 0 0; color: #737b8c; text-align: center; font-family: "Instrument Serif", serif; font-size: 18px; font-style: italic; }

    .entry-panel {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 120;
      width: 430px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--line-strong);
      background:
        radial-gradient(circle at 90% 0%, rgba(73,145,255,.18), transparent 20rem),
        linear-gradient(180deg, rgba(10,20,37,.99), rgba(5,11,21,.995));
      box-shadow: -28px 0 70px rgba(0,0,0,.42);
      transform: translateX(105%);
      visibility: hidden;
      transition: transform .42s cubic-bezier(.22,.8,.24,1), visibility .42s;
    }
    .entry-panel.open { transform: translateX(0); visibility: visible; }
    .panel-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 70px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }
    .panel-nav { display: flex; align-items: center; gap: 8px; }
    .panel-button {
      width: 42px; height: 42px; border: 1px solid var(--line); border-radius: 50%;
      background: rgba(255,255,255,.025); cursor: pointer; font-size: 21px;
      transition: background .2s ease, border-color .2s ease, transform .2s ease;
    }
    .panel-button:hover { background: var(--purple-soft); border-color: var(--line-strong); transform: translateY(-1px); }
    .panel-position { color: var(--muted); font-size: 12px; letter-spacing: .04em; }
    .panel-content { flex: 1; overflow-y: auto; padding: clamp(30px, 5vw, 52px) 34px 40px; }
    .panel-kicker { color: var(--purple); font-size: 11px; font-weight: 600; letter-spacing: .11em; text-transform: uppercase; }
    .panel-title {
      margin: 18px 0 22px; font-family: "Instrument Serif", serif; font-size: clamp(48px, 5vw, 68px);
      font-weight: 400; line-height: .93; letter-spacing: -.035em; overflow-wrap: anywhere;
    }
    .panel-rule { width: 64px; height: 1px; margin: 0 0 28px; background: linear-gradient(90deg,var(--purple),transparent); }
    .panel-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
    .panel-meta-item { padding: 15px; border: 1px solid var(--line); border-radius: 13px; background: rgba(255,255,255,.025); }
    .panel-meta-item span { display: block; color: var(--muted); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
    .panel-meta-item strong { display: block; margin-top: 7px; font-family: "Instrument Serif", serif; font-size: 23px; font-weight: 400; }
    .panel-message { padding-top: 26px; border-top: 1px solid var(--line); color: var(--serif-muted); font-family: "Instrument Serif", serif; font-size: 25px; line-height: 1.35; }
    .panel-message.removed { color: #c9a0ad; }

    @media (max-width: 900px) {
      body.panel-open { overflow: hidden; }
      body.panel-open .shell { padding-right: 0; }
      main { padding: 22px 18px 70px; }
      .topbar { margin-bottom: 44px; }
      .eyebrow { display: none; }
      .top-actions { width: 100%; }
      .search-wrap { width: 100%; }
      .entries-head { display: none; }
      .entries-panel { padding: 0 4px; }
      .entry-row { grid-template-columns: 50px minmax(0,1fr); gap: 16px; min-height: 78px; padding: 12px 8px; }
      .entry-date, .entry-status { display: none; }
      .entry-title { font-size: clamp(29px, 6vw, 38px); }
      .entry-panel {
        top: auto; bottom: 0; width: 100%; height: min(88dvh, 760px); border-left: 0; border-top: 1px solid var(--line-strong);
        border-radius: 24px 24px 0 0; transform: translateY(105%);
      }
      .entry-panel.open { transform: translateY(0); }
      .panel-topbar::before { content: ""; position: absolute; top: 9px; left: 50%; width: 42px; height: 4px; border-radius: 99px; background: rgba(255,255,255,.22); transform: translateX(-50%); }
      .panel-topbar { position: relative; padding-top: 20px; }
      .panel-content { padding: 30px 24px 34px; }
      .panel-title { font-size: clamp(46px, 12vw, 64px); }
    }

    @media (max-width: 560px) {
      main { padding-inline: 16px; }
      .top-actions .select-wrap { display: none; }
      .hero-copy h1 { font-size: 78px; }
      .hero-copy p { font-size: 15px; }
      .content-grid { margin-top: 28px; }
      .entries-panel { padding: 0; }
      .entry-row { grid-template-columns: 38px minmax(0,1fr); gap: 12px; min-height: 72px; padding-inline: 6px; }
      .entry-num { font-size: 12px; }
      .entry-title { font-size: 29px; }
      .entry-panel { height: 100dvh; border-radius: 0; }
      .panel-meta { grid-template-columns: 1fr; }
    }
  
    .masthead-icon {
      display: inline-grid;
      place-items: center;
      width: 1.15em;
      height: 1.15em;
      margin-right: .48em;
      color: var(--purple);
      vertical-align: -0.16em;
      flex: 0 0 auto;
    }

    .masthead-icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .back-to-top {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 80;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(10, 17, 30, .88);
      color: var(--purple);
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: opacity .22s ease, transform .22s ease, visibility .22s ease,
                  background .22s ease, border-color .22s ease;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 12px 34px rgba(0, 0, 0, .24);
    }

    .back-to-top.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background: var(--purple-soft);
      border-color: var(--purple);
    }

    .back-to-top svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .detail-panel,
    .panel-body,
    .sidebar-panel,
    .entry-panel {
      scrollbar-width: thin;
      scrollbar-color: rgba(105, 169, 255, .58) transparent;
    }

    .detail-panel::-webkit-scrollbar,
    .panel-body::-webkit-scrollbar,
    .sidebar-panel::-webkit-scrollbar,
    .entry-panel::-webkit-scrollbar {
      width: 6px;
    }

    .detail-panel::-webkit-scrollbar-track,
    .panel-body::-webkit-scrollbar-track,
    .sidebar-panel::-webkit-scrollbar-track,
    .entry-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .detail-panel::-webkit-scrollbar-thumb,
    .panel-body::-webkit-scrollbar-thumb,
    .sidebar-panel::-webkit-scrollbar-thumb,
    .entry-panel::-webkit-scrollbar-thumb {
      background: rgba(105, 169, 255, .48);
      border-radius: 999px;
    }

    .detail-panel::-webkit-scrollbar-thumb:hover,
    .panel-body::-webkit-scrollbar-thumb:hover,
    .sidebar-panel::-webkit-scrollbar-thumb:hover,
    .entry-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(105, 169, 255, .78);
    }

    @media (max-width: 640px) {
      .back-to-top {
        right: 14px;
        bottom: 14px;
        width: 40px;
        height: 40px;
      }
    }

  
    @media (max-width: 760px) {
      .month-divider {
        grid-template-columns: 48px minmax(0, 1fr);
        gap: 12px;
        min-height: 68px;
        padding: 24px 12px 10px;
      }

      .month-divider:first-child {
        min-height: 54px;
        padding-top: 10px;
      }

    }
</style>
</head>

    const entriesList = document.getElementById('entriesList');
    const searchInput = document.getElementById('searchInput');
    const emptyState = document.getElementById('emptyState');
    let visibleEntries = [];
    let activePanelIndex = -1;

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      visibleEntries = entries.filter(entry =>
        entry.title.toLowerCase().includes(query)
      );

      let currentMonth = '';
      entriesList.innerHTML = visibleEntries.map((entry, index) => {
        const month = entry.date.split(' ').slice(1).join(' ');
        const monthHeading = month !== currentMonth
          ? `<div class="month-divider" aria-label="${escapeHtml(month)} entries"><span class="month-divider-name">${escapeHtml(month)}</span></div>`
          : '';

        currentMonth = month;

        return `${monthHeading}
        <article class="entry-row ${entry.published ? '' : 'removed-row'}" data-index="${index}" tabindex="0" aria-label="Open archive information for ${escapeHtml(entry.title)}">
          <span class="entry-num">${entry.displayNumber}</span>
          <span class="entry-title">${escapeHtml(entry.title)}</span>
          <span class="entry-date">${entry.dateTime}</span>
          <span class="entry-status ${entry.published ? '' : 'removed'}">${entry.published ? 'published' : 'removed'}</span>
        </article>`;
      }).join('');

      emptyState.style.display = visibleEntries.length ? 'none' : 'block';
    }

    function escapeHtml(value) {
      return value.replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }

    document.addEventListener('click', event => {
      const row = event.target.closest('.entry-row');
      if (row) openEntryPanel(Number(row.dataset.index));
    });

    document.addEventListener('keydown', event => {
      if (event.target.closest('.entry-row') && (event.key === 'Enter' || event.key === ' ')) {
        event.preventDefault();
        openEntryPanel(Number(event.target.closest('.entry-row').dataset.index));
      }
    });

    searchInput.addEventListener('input', render);

    const entryPanel = document.getElementById('entryPanel');
    const panelTitle = document.getElementById('panelTitle');
    const panelDate = document.getElementById('panelDate');
    const panelStatus = document.getElementById('panelStatus');
    const panelMessage = document.getElementById('panelMessage');
    const panelPosition = document.getElementById('panelPosition');

    function openEntryPanel(index) {
      if (!visibleEntries.length) return;
      activePanelIndex = (index + visibleEntries.length) % visibleEntries.length;
      const entry = visibleEntries[activePanelIndex];
      panelTitle.textContent = entry.title;
      panelDate.textContent = entry.dateTime;
      panelStatus.textContent = entry.published ? 'Published' : 'Removed';
      panelMessage.textContent = entry.published
        ? 'This diary entry is not available to read. Only its title has been archived.'
        : 'This entry has been removed. Its title remains in the archive.';
      panelMessage.classList.toggle('removed', !entry.published);
      panelPosition.textContent = `${activePanelIndex + 1} / ${visibleEntries.length}`;
      entryPanel.classList.add('open');
      entryPanel.setAttribute('aria-hidden', 'false');
      document.body.classList.add('panel-open');
    }

    function closeEntryPanel() {
      entryPanel.classList.remove('open');
      entryPanel.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('panel-open');
    }

    document.getElementById('panelClose').addEventListener('click', closeEntryPanel);
    document.getElementById('panelPrev').addEventListener('click', () => openEntryPanel(activePanelIndex - 1));
    document.getElementById('panelNext').addEventListener('click', () => openEntryPanel(activePanelIndex + 1));

    document.addEventListener('keydown', event => {
      if (!entryPanel.classList.contains('open')) return;
      if (event.key === 'Escape') closeEntryPanel();
      if (event.key === 'ArrowLeft') openEntryPanel(activePanelIndex - 1);
      if (event.key === 'ArrowRight') openEntryPanel(activePanelIndex + 1);
    });


    render();
  
    const backToTop = document.getElementById('backToTop');

    if (backToTop) {
      function updateBackToTop() {
        backToTop.classList.toggle('is-visible', window.scrollY > 320);
      }

      window.addEventListener('scroll', updateBackToTop, { passive: true });
      updateBackToTop();

      backToTop.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }

  </script>
