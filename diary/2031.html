<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lewis.lc</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      font-weight: 300;
      line-height: 1.5;
      margin: 0;
      padding: 2rem 1rem;
      background: #fff;
      color: #111;
    }

    * { box-sizing: border-box; }

    .page-wrap {
      max-width: 46em;
      margin: 0 auto;
    }

    /* ===== YEAR NAV ===== */

    .year-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .year-nav a {
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid #ddd;
      color: #555;
      transition: all 0.2s ease;
    }

    .year-nav a:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .year-nav a[aria-current="page"] {
      background: #111;
      color: #fff;
      border-color: #111;
      font-weight: 600;
    }

    /* ===== HEADER ===== */

    .page-header {
      margin: 0 0 2rem;
    }

    .page-header h1 {
      font-size: 1.9rem;
      line-height: 1.1;
      margin: 0 0 0.2rem;
      font-weight: 700;
    }

    .page-header p {
      margin: 0;
      font-size: 1.05rem;
      font-style: italic;
      color: #555;
    }

    /* ===== TIMELINE ===== */

    .timeline {
      list-style: none;
      margin: 0;
      padding: 0;
      position: relative;
    }

    .timeline::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 1.5rem;
      width: 2px;
      background: black;
    }

    .timeline-event {
      position: relative;
      margin-bottom: 2.5rem;
      padding-left: 3.5rem;
      opacity: 0;
      transform: translateY(8px);
      transition:
        opacity 0.95s cubic-bezier(.22,1,.36,1),
        transform 0.95s cubic-bezier(.22,1,.36,1);
    }

    .timeline-event.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .timeline-event-icon {
      position: absolute;
      top: 0.56rem;
      left: 1.5rem;
      width: 1rem;
      height: 1rem;
      margin-left: -0.5rem;
      background: black;
      outline: 10px solid white;
      transform: rotate(45deg);
      transition: 0.2s ease;
    }

    .timeline-event-thumbnail {
      display: inline-flex;
      align-items: center;
      height: 2rem;
      margin: 0 0 1em;
      padding: 0 1em;
      border-radius: 20px;
      background: black;
      color: white;
      font-size: 0.9rem;
      line-height: 1;
      transition: 0.3s ease;
    }

    .timeline-event:hover .timeline-event-icon {
      transform: rotate(-45deg);
      background: rgb(168, 50, 121);
    }

    .timeline-event:hover .timeline-event-thumbnail {
      box-shadow: inset 20em 0 0 0 rgb(168, 50, 121);
    }

    /* ===== ENTRIES ===== */

    .timeline-list {
      display: grid;
      gap: 0.45rem;
      margin-top: 0.15rem;
    }

    .timeline-entry {
      display: grid;
      grid-template-columns: 2.5rem 1fr;
      gap: 0.85rem;
      align-items: start;
    }

    .timeline-day {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 2rem;
      padding: 0 0.45rem;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1;
      color: #111;
      background: #fafafa;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }

    .timeline-title {
      padding-top: 0.2rem;
      line-height: 1.4;
    }

    /* ===== MOBILE ===== */

    @media (max-width: 700px) {
      .timeline::before { left: 1rem; }

      .timeline-event { padding-left: 2.8rem; }

      .timeline-event-icon {
        left: 1rem;
        top: 0.53rem;
      }

      .timeline-entry {
        grid-template-columns: 2.2rem 1fr;
        gap: 0.7rem;
      }

      .timeline-day,
      .timeline-event-thumbnail {
        height: 1.85rem;
        font-size: 0.82rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .timeline-event {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }

  </style>
</head>

<body>
  <div class="page-wrap">

    <!-- YEAR SWITCHER -->
    <nav class="year-nav">
      <a href="/diary/2024">2024</a>
      <a href="/diary/2025">2025</a>
      <a href="/diary/2026" aria-current="page">2026</a>
    </nav>

    <!-- HEADER -->
    <header class="page-header">
      <h1>2026 Diary</h1>
      <p>too far gone</p>
    </header>

    <!-- TIMELINE -->
    <ul class="timeline">

      <li class="timeline-event">
        <span class="timeline-event-icon"></span>
        <div class="timeline-event-copy">
          <p class="timeline-event-thumbnail">January</p>

          <div class="timeline-list">
            <div class="timeline-entry"><span class="timeline-day">01</span><span class="timeline-title">everything changes in the end</span></div>
            <div class="timeline-entry"><span class="timeline-day">02</span><span class="timeline-title">the light of day</span></div>
            <div class="timeline-entry"><span class="timeline-day">03</span><span class="timeline-title">chilled out</span></div>
            <div class="timeline-entry"><span class="timeline-day">04</span><span class="timeline-title">trying to change</span></div>
            <div class="timeline-entry"><span class="timeline-day">05</span><span class="timeline-title">i’ve been playing pretend</span></div>
            <div class="timeline-entry"><span class="timeline-day">06</span><span class="timeline-title">dead names</span></div>
            <div class="timeline-entry"><span class="timeline-day">07</span><span class="timeline-title">a walk in the park</span></div>
            <div class="timeline-entry"><span class="timeline-day">08</span><span class="timeline-title">love for kim</span></div>
          </div>
        </div>
      </li>

    </ul>

  </div>

  <script>
    const timelineEvents = document.querySelectorAll('.timeline-event');

    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          obs.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.16,
      rootMargin: "0px 0px -24px 0px"
    });

    timelineEvents.forEach((event, index) => {
      event.style.transitionDelay = `${index * 55}ms`;
      observer.observe(event);
    });
  </script>

</body>
</html>
