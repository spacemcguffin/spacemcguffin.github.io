<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2028 Diary</title>

<link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

/* ---------- RESET ---------- */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
scroll-behavior:smooth;
}

::selection{
background:#cfd8e4;
color:#000;
}

/* ---------- BLUE THEME ---------- */

:root{

--white-color:#f6fbff;
--hovertext-color:#132238;
--hoverback-color:rgba(76,144,255,0.10);
--black-color:#16263f;

--light-white-color:rgba(255,255,255,0.74);
--light-gray-color:rgba(71,120,214,0.08);
--border-color:rgba(78,126,214,0.16);

--primary-color:#3f7cff;
--secondary-color:#5c7396;

--maintitle-color:#2d68d8;

--bg-0:#f4f8ff;
--bg-1:#ebf2ff;
--bg-2:#e2edff;

--glass-bg:rgba(255,255,255,0.68);
--glass-strong:rgba(255,255,255,0.82);

--neon-blue:#59a8ff;
--neon-cyan:#73d8ff;

--neon-edge:rgba(63,124,255,0.16);

--panel-shadow:
0 12px 40px rgba(44,79,132,0.10),
0 0 0 1px rgba(255,255,255,0.35) inset;

}

/* ---------- DARK MODE ---------- */

.dark-mode{

--white-color:#07111f;
--hovertext-color:#eef6ff;
--hoverback-color:rgba(77,144,255,0.11);
--black-color:#e9f3ff;

--light-white-color:rgba(255,255,255,0.03);
--light-gray-color:rgba(78,126,214,0.10);
--border-color:rgba(102,173,255,0.16);

--primary-color:#79b7ff;
--secondary-color:#a8bfdc;

--maintitle-color:#7fc3ff;

--bg-0:#06101d;
--bg-1:#0b1830;
--bg-2:#102446;

--glass-bg:rgba(10,19,38,0.76);
--glass-strong:rgba(12,22,43,0.86);

--neon-blue:#63b8ff;
--neon-cyan:#89e6ff;

--panel-shadow:
0 18px 50px rgba(0,0,0,0.34),
0 0 0 1px rgba(255,255,255,0.03) inset;

}

/* ---------- BACKGROUND ---------- */

body{
background:
radial-gradient(circle at 14% 10%, rgba(89,168,255,0.10), transparent 22%),
radial-gradient(circle at 82% 14%, rgba(115,216,255,0.10), transparent 22%),
radial-gradient(circle at 50% 100%, rgba(86,132,255,0.07), transparent 28%),
linear-gradient(180deg,var(--bg-0),var(--bg-1) 48%,var(--bg-2));

color:var(--black-color);
overflow-x:hidden;
}

/* ---------- NAVBAR ---------- */

.navbar{

display:flex;
align-items:center;
justify-content:space-between;

padding:0.8rem 1rem;

margin:0.7rem;

border:1px solid var(--border-color);
border-radius:22px;

background:
linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0.03)),
var(--glass-bg);

backdrop-filter:blur(18px);

box-shadow:var(--panel-shadow);

}

/* ---------- CATEGORY PILLS ---------- */

.category-button{

border:1px solid var(--border-color);

padding:8px 14px;

border-radius:999px;

background:
linear-gradient(180deg,rgba(255,255,255,0.10),rgba(255,255,255,0.02)),
var(--glass-bg);

font-size:.88rem;

}

.category-button.active{

background:
linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02)),
linear-gradient(90deg,rgba(89,168,255,0.14),rgba(115,216,255,0.12));

border-color:rgba(99,184,255,0.18);

}

/* ---------- ARTICLE ---------- */

.article{

border:1px solid var(--border-color);

border-radius:28px;

padding:clamp(18px,2vw,28px);

box-shadow:var(--panel-shadow);

}

.article h1{

color:var(--maintitle-color);

font-size:clamp(2rem,3vw,2.7rem);

font-weight:800;

text-transform:uppercase;

margin-bottom:1.3rem;

}

.article h1::after{

content:"";

display:block;

width:92px;
height:3px;

margin-top:0.75rem;

border-radius:999px;

background:linear-gradient(90deg,var(--neon-blue),var(--neon-cyan),transparent);

}

/* ---------- TABLE ---------- */

.maintable{

border:1px solid var(--border-color);
border-radius:22px;
overflow:hidden;

}

tr{

border-bottom:1px solid var(--border-color);

}

tr:hover{

background:var(--hoverback-color);

}

.month-row td{

background:
linear-gradient(90deg,
rgba(89,168,255,0.14),
rgba(115,216,255,0.10) 42%,
rgba(255,255,255,0.02) 65%,
transparent);

}

.day-cell span{

border-radius:999px;

border:1px solid rgba(99,184,255,0.18);

background:
linear-gradient(135deg,
rgba(89,168,255,0.08),
rgba(115,216,255,0.08));

}

/* ---------- SCROLLBAR ---------- */

*::-webkit-scrollbar{
width:10px;
}

*::-webkit-scrollbar-thumb{

border-radius:999px;

background:
linear-gradient(180deg,
rgba(89,168,255,0.28),
rgba(115,216,255,0.18));

}

</style>
</head>

<body class="sidebar-hidden dark-mode">

<!-- EVERYTHING ELSE REMAINS IDENTICAL -->

</body>
</html>
