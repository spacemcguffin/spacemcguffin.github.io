<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lewis.lc</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      margin: 0;
      padding: 2rem 1rem;
      background: #fff;
      color: #3a3a3a;
    }

    * { box-sizing: border-box; scroll-behavior: smooth; }

    ::selection {
      background: #cfd8e4;
      color:#000;
    }

    .page-wrap {
      max-width: 46em;
      margin: 0 auto;
    }

    .year-nav {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .year-nav a {
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      border: 1px solid #ddd;
      color: #555;
      transition: all 0.2s ease;
    }

    .year-nav a:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .year-nav a[aria-current="page"] {
      background: #2c3862;
      color: #fff;
      border-color: #2c3862;
      font-weight: 600;
    }

    .page-header {
      margin: 0 0 2rem;
    }

    .page-header h1 {
      font-size: 2rem;
      margin: 0;
      font-weight: 700;
      font-family: 'Onest', sans-serif;
    }

    /* --- TIMELINE --- */

    .timeline {
      list-style: none;
      margin: 0;
      padding: 0;
      position: relative;
    }

    /* REMOVE old full-height line */
    .timeline::before {
      display: none;
    }

    .timeline-event {
      position: relative;
      margin-bottom: 2.5rem;
      padding-left: 3.5rem;
    }

    /* NEW per-event line */
    .timeline-event::before {
      content: "";
      position: absolute;
      left: 1.5rem;
      top: 1.1rem;
      bottom: -2.5rem;
      width: 2px;
      margin-left: -1px;
      background: black;
    }

    /* STOP line after last item */
    .timeline-event:last-child::before {
      display: none;
    }

    .timeline-event-icon {
      position: absolute;
      top: 0.56rem;
      left: 1.5rem;
      width: 1rem;
      height: 1rem;
      margin-left: -0.5rem;
      background: #4b6a9b;
      outline: 10px solid white;
      transform: rotate(45deg);
      transition: 0.2s ease;
    }

    .timeline-event-thumbnail {
      display: inline-flex;
      align-items: center;
      height: 2rem;
      margin: 0 0 1em;
      padding: 0 1em;
      border-radius: 20px;
      background: #4b6a9b;
      color: white;
      font-size: 0.9rem;
      line-height: 1;
      transition: 0.3s ease;
      text-decoration: none;
    }

    .timeline-event:hover .timeline-event-icon {
      transform: rotate(-45deg);
      background: #2c3862;
    }

    .timeline-event:hover .timeline-event-thumbnail {
      box-shadow: inset 20em 0 0 0 #2c3862;
    }

    .timeline-list {
      display: grid;
      gap: 0.45rem;
    }

    .timeline-entry {
      display: grid;
      grid-template-columns: 2.5rem 1fr;
      gap: 0.85rem;
    }

    .timeline-day {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 2rem;
      border: 1px solid #ddd;
      border-radius: 15px;
      font-size: 0.88rem;
      font-weight: 700;
      background: #fafafa;
    }

    .timeline-title {
      padding-top: 0.2rem;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      .timeline-event { padding-left: 2.8rem; }

      .timeline-event::before { left: 1rem; }

      .timeline-event-icon {
        left: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrap">

    <nav class="year-nav">
      <a href="/diary/2024">2024</a>
      <a href="/diary/2025" aria-current="page">2025</a>
      <a href="/diary/2026">2026</a>
    </nav>

    <header class="page-header">
      <h1 id="top">2025 Diary</h1>
    </header>

    <ul class="timeline">

      <!-- your timeline content unchanged -->

      <li class="timeline-event">
        <span class="timeline-event-icon"></span>
        <div>
          <a href="#top" class="timeline-event-thumbnail">Back to Top</a>
        </div>
      </li>

    </ul>
  </div>
</body>
</html>
